<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ScoreTrak Admin V5 - Pro Edition</title>
    <style>
        body { font-family: system-ui, sans-serif; background: #000; color: white; text-align: center; margin: 0; padding: 10px; height: 100vh; display: flex; flex-direction: column; box-sizing: border-box; }
        .logo-trak { font-size: 40px; font-weight: 900; color: #ccff00; font-style: italic; margin: 15px 0; letter-spacing: -2px; }
        #setup-screen, #score-screen { display: none; flex-direction: column; align-items: center; justify-content: center; flex: 1; }
        .team-input { background: #1a1a1a; padding: 12px; border-radius: 12px; margin-bottom: 8px; border-left: 8px solid; width: 88%; text-align: left; }
        input, select { width: 92%; padding: 12px; margin: 4px 0; border-radius: 8px; border: none; background: #333; color: white; font-size: 15px; }
        .config-row { background: #1a1a1a; padding: 12px; border-radius: 12px; width: 88%; margin-bottom: 10px; text-align: left; }
        label { font-size: 11px; color: #888; text-transform: uppercase; margin-left: 5px; }
        .share-card { background: #1a1a1a; padding: 15px; border-radius: 15px; width: 88%; margin: 10px 0; border: 1px solid #333; }
        .btn-share { background: #ccff00; color: black; padding: 12px; border: none; border-radius: 10px; width: 100%; font-weight: bold; text-transform: uppercase; font-size: 12px; margin-bottom: 10px; }
        .warning-box { background: rgba(255, 204, 0, 0.05); border: 1px solid #ffcc00; border-radius: 8px; padding: 8px; text-align: left; }
        .btn-start { background: #ccff00; color: black; padding: 18px; border: none; border-radius: 15px; width: 88%; font-weight: bold; text-transform: uppercase; font-size: 16px; margin-top: 10px; }
        .btn-point { width: 92%; padding: 35px 0; border: none; border-radius: 20px; color: white; font-size: 20px; font-weight: bold; text-transform: uppercase; margin: 8px 0; transition: 0.1s; }
        .btn-point:active { transform: scale(0.95); }
        .vert { background: #2E7D32; } .bleu { background: #1565C0; }
        .serving { border: 4px solid #ccff00; box-shadow: 0 0 15px #ccff00; }
        .btn-action { background: #333; color: white; padding: 15px; border: none; border-radius: 12px; width: 44%; margin: 5px; font-weight: bold; font-size: 12px; }
        #court-label { position: fixed; top: 0; left: 0; width: 100%; background: #ccff00; color: #000; font-size: 10px; font-weight: bold; padding: 3px 0; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="court-label">Connexion...</div>

    <div id="setup-screen">
        <div class="logo-trak" style="font-size: 22px;">Configuration</div>
        <div class="team-input" style="border-color: #4CAF50;"><input type="text" id="pA1" placeholder="Vert 1 (Serv)"><input type="text" id="pA2" placeholder="Vert 2"></div>
        <div class="team-input" style="border-color: #2196F3;"><input type="text" id="pB1" placeholder="Bleu 1 (Serv)"><input type="text" id="pB2" placeholder="Bleu 2"></div>
        <div class="config-row">
            <label>Engagement</label><select id="firstTeam"><option value="A">SERV. VERT</option><option value="B">SERV. BLEU</option></select>
            <label>Règle 40-40</label><select id="rule"><option value="decisif">POINT DÉCISIF</option><option value="avantage">AVANTAGE</option></select>
            <label>Format</label><select id="maxSets"><option value="2">2 SETS GAGNANTS</option><option value="3">3 SETS GAGNANTS</option></select>
        </div>
        <div class="share-card">
            <button class="btn-share" onclick="shareToWatch()">🔗 Envoyer à ma montre</button>
            <div class="warning-box"><p style="margin:0; font-size:11px;"><b style="color:#ffcc00">WATCH :</b> Ouvrez le lien via l'app <b>Messages</b>.</p></div>
        </div>
        <button class="btn-start" onclick="startMatch()">LANCER LE MATCH</button>
    </div>

    <div id="score-screen">
        <button id="btnA" class="btn-point vert" onclick="addPoint('scoreA')"></button>
        <button id="btnB" class="btn-point bleu" onclick="addPoint('scoreB')"></button>
        <div style="display: flex; width: 100%; justify-content: center; margin-top: 15px;">
            <button class="btn-action" onclick="undo()">↩ ANNULER</button>
            <button class="btn-action" style="background: #800;" onclick="resetMatch()">⚠ RESET</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, get, onValue, update, remove, push, query, limitToLast } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const fbConfig = { apiKey: "AIzaSyCjlHL7GEXFvnrNzZAIEZyl-WCqUI3txiM", authDomain: "scoretrak-123.firebaseapp.com", databaseURL: "https://scoretrak-123-default-rtdb.europe-west1.firebasedatabase.app", projectId: "scoretrak-123" };
        const app = initializeApp(fbConfig);
        const db = getDatabase(app);

        // RÉCUPÉRATION DES PARAMÈTRES D'URL
        const params = new URLSearchParams(window.location.search);
        const clubId = params.get('clubId');
        const courtId = params.get('courtId');

        if(!clubId || !courtId) {
            document.body.innerHTML = "<h2 style='color:red; padding:50px;'>ERREUR D'URL<br><small>Scannez le QR Code de la TV</small></h2>";
        }

        const matchRef = ref(db, `clubs/${clubId}/courts/${courtId}`);
        const historyRef = ref(db, `history/${clubId}/${courtId}`);

        // --- SYNCHRONISATION ---
        onValue(matchRef, (snap) => {
            const d = snap.val();
            if(!d) return;

            document.getElementById('court-label').innerText = d.name || "Terrain Connecté";
            
            // AUTO-SETUP : Si on ouvre le smartphone et que la TV est en veille (idle)
            if (d.status === 'idle') {
                update(matchRef, { status: 'setup' });
                return;
            }

            const setup = document.getElementById('setup-screen'), score = document.getElementById('score-screen');
            if (d.status === 'setup') { setup.style.display = 'flex'; score.style.display = 'none'; }
            else if (d.status === 'active') {
                setup.style.display = 'none'; score.style.display = 'flex';
                document.getElementById('btnA').innerHTML = `${d.pA1}<br>${d.pA2}`;
                document.getElementById('btnB').innerHTML = `${d.pB1}<br>${d.pB2}`;
                document.getElementById('btnA').classList.toggle('serving', d.serverTeam === 'A');
                document.getElementById('btnB').classList.toggle('serving', d.serverTeam === 'B');
            }
        });

        window.startMatch = () => {
            remove(historyRef); // On vide l'historique du match précédent
            set(matchRef, {
                status: 'active', winner: null,
                name: document.getElementById('court-label').innerText,
                rule: document.getElementById('rule').value,
                maxSets: parseInt(document.getElementById('maxSets').value),
                pA1: document.getElementById('pA1').value || "VERT 1", pA2: document.getElementById('pA2').value || "VERT 2",
                pB1: document.getElementById('pB1').value || "BLEU 1", pB2: document.getElementById('pB2').value || "BLEU 2",
                scoreA: 0, scoreB: 0, gamesA: 0, gamesB: 0, setsA: 0, setsB: 0,
                serverTeam: document.getElementById('firstTeam').value, serverNum: 1, totalGames: 0
            });
        };

        window.addPoint = async (team) => {
            const snap = await get(matchRef); let d = snap.val();
            if (!d || d.winner) return;
            
            // On enregistre l'état actuel pour le Undo
            await push(historyRef, JSON.stringify(d));
            
            const other = (team === 'scoreA') ? 'scoreB' : 'scoreA';

            // LOGIQUE TIE-BREAK
            if (d.gamesA === 6 && d.gamesB === 6) {
                d[team]++;
                let tt = d.scoreA + d.scoreB;
                // En tie-break, on change de serveur au premier point, puis tous les 2 points
                if (tt % 2 === 1) d.serverTeam = (d.serverTeam === 'A' ? 'B' : 'A');
                d.serverNum = (Math.floor(tt / 2) % 2) + 1;
                if (d[team] >= 7 && (d[team] - d[other]) >= 2) winGame(d, team);
            } 
            // LOGIQUE JEU NORMAL
            else {
                if (d.rule === 'decisif') { 
                    if (d[team] === 3) winGame(d, team); else d[team]++; 
                } else {
                    if (d[team] < 3) d[team]++;
                    else if (d[team] === 3 && d[other] < 3) winGame(d, team);
                    else if (d[team] === 3 && d[other] === 3) d[team] = 4; // Avantage
                    else if (d[team] === 4) winGame(d, team); // Gagne après avantage
                    else if (d[team] === 3 && d[other] === 4) d[other] = 3; // Revient à égalité
                }
            }
            set(matchRef, d);
        };

        function winGame(d, team) {
            const curIdx = (d.setsA || 0) + (d.setsB || 0) + 1;
            if (d.gamesA === 6 && d.gamesB === 6) {
                d['tb' + curIdx + 'A'] = d.scoreA; d['tb' + curIdx + 'B'] = d.scoreB;
            }
            d.scoreA = 0; d.scoreB = 0;
            d[team === 'scoreA' ? 'gamesA' : 'gamesB']++;
            d.totalGames++;
            
            // Rotation Serveur Standard
            d.serverTeam = (d.serverTeam === 'A' ? 'B' : 'A');
            d.serverNum = (Math.floor(d.totalGames / 2) % 2) + 1;

            // Vérification fin de Set
            if (((d.gamesA >= 6 || d.gamesB >= 6) && Math.abs(d.gamesA - d.gamesB) >= 2) || d.gamesA === 7 || d.gamesB === 7) {
                finishSet(d, team);
            }
        }

        function finishSet(d, team) {
            const idx = (d.setsA || 0) + (d.setsB || 0) + 1;
            d['s' + idx + 'A'] = d.gamesA; d['s' + idx + 'B'] = d.gamesB;
            d.gamesA = 0; d.gamesB = 0; d.scoreA = 0; d.scoreB = 0; d.totalGames = 0;
            d[team === 'scoreA' ? 'setsA' : 'setsB']++;
            
            if (d.setsA >= d.maxSets) d.winner = 'A';
            if (d.setsB >= d.maxSets) d.winner = 'B';
        }

        window.undo = async () => {
            const hSnap = await get(query(historyRef, limitToLast(1)));
            if (hSnap.exists()) {
                const key = Object.keys(hSnap.val())[0];
                const lastState = JSON.parse(hSnap.val()[key]);
                set(matchRef, lastState);
                remove(ref(db, `history/${clubId}/${courtId}/${key}`));
            }
        };

        window.resetMatch = () => { 
            if(confirm("Voulez-vous réinitialiser le terrain et arrêter le match ?")) {
                set(matchRef, { status: 'idle', name: document.getElementById('court-label').innerText }); 
            }
        };

        window.shareToWatch = () => {
            const url = window.location.href.replace('SmartphoneV5', 'WATCHV5');
            if (navigator.share) {
                navigator.share({ title: 'ScoreTrak Watch', url: url });
            } else {
                navigator.clipboard.writeText(url);
                alert("Lien montre copié ! Envoyez-le par message.");
            }
        };
    </script>
</body>
</html>
