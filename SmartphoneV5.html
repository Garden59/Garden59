<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ScoreTrak Admin V5 - Full</title>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; background: #000; color: white; text-align: center; margin: 0; padding: 10px; height: 100vh; display: flex; flex-direction: column; }
        .logo-trak { font-size: 40px; font-weight: 900; color: #ccff00; font-style: italic; margin: 15px 0; }
        
        #init-screen, #setup-screen, #score-screen { display: none; flex-direction: column; align-items: center; justify-content: center; flex: 1; }
        
        .team-input { background: #1a1a1a; padding: 12px; border-radius: 12px; margin-bottom: 8px; border-left: 8px solid; width: 88%; text-align: left; }
        input, select { width: 92%; padding: 12px; margin: 4px 0; border-radius: 8px; border: none; background: #333; color: white; font-size: 15px; }
        
        .config-row { background: #1a1a1a; padding: 12px; border-radius: 12px; width: 88%; margin-bottom: 10px; text-align: left; box-sizing: border-box; }
        label { font-size: 11px; color: #888; margin-left: 5px; text-transform: uppercase; }

        .share-card { background: #1a1a1a; padding: 15px; border-radius: 15px; width: 88%; margin: 10px 0; border: 1px solid #333; box-sizing: border-box; }
        .btn-share { background: #ccff00; color: black; padding: 12px; border: none; border-radius: 10px; width: 100%; font-weight: bold; text-transform: uppercase; font-size: 12px; margin-bottom: 10px; }
        
        .warning-box { background: rgba(255, 204, 0, 0.05); border: 1px solid #ffcc00; border-radius: 8px; padding: 8px; text-align: left; }
        .warning-box p { color: #ccc; font-size: 10px; margin: 0; line-height: 1.3; }

        .btn-start { background: #ccff00; color: black; padding: 18px; border: none; border-radius: 15px; width: 88%; font-weight: bold; text-transform: uppercase; margin-top: 10px; font-size: 16px; }
        
        .btn-point { width: 92%; padding: 35px 0; border: none; border-radius: 20px; color: white; font-size: 20px; font-weight: bold; text-transform: uppercase; margin: 8px 0; }
        .vert { background: #2E7D32; } .bleu { background: #1565C0; }
        .btn-action { background: #333; color: white; padding: 15px; border: none; border-radius: 12px; width: 44%; margin: 5px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="init-screen" style="display: flex;">
        <div class="logo-trak">ScoreTrak</div>
        <button class="btn-start" onclick="goToSetup()">PRÉPARER LE MATCH</button>
    </div>

    <div id="setup-screen">
        <div class="logo-trak" style="font-size: 22px; margin: 10px 0;">Configuration</div>
        
        <div class="team-input" style="border-color: #4CAF50;">
            <input type="text" id="pA1" placeholder="Joueur Vert 1 (Serveur)">
            <input type="text" id="pA2" placeholder="Joueur Vert 2">
        </div>
        
        <div class="team-input" style="border-color: #2196F3;">
            <input type="text" id="pB1" placeholder="Joueur Bleu 1 (Serveur)">
            <input type="text" id="pB2" placeholder="Joueur Bleu 2">
        </div>

        <div class="config-row">
            <label>Qui engage ?</label>
            <select id="firstTeam"><option value="A">ÉQUIPE VERTE</option><option value="B">ÉQUIPE BLEUE</option></select>
            
            <label>Règle de score</label>
            <select id="gameRule"><option value="decisif">POINT DÉCISIF (NO-AD)</option><option value="avantage">AVANTAGE (DEUCE)</option></select>
            
            <label>Format</label>
            <select id="maxSets"><option value="2">2 SETS GAGNANTS</option><option value="3">3 SETS GAGNANTS</option></select>
        </div>
        
        <div class="share-card">
            <button class="btn-share" onclick="shareToWatch()">🔗 Envoyer le lien à ma montre</button>
            <div class="warning-box">
                <p><b style="color:#ffcc00">APPLE WATCH :</b> Ouvrez le lien via l'app <b>Messages</b> (pas via la notification).</p>
            </div>
        </div>
        
        <button class="btn-start" onclick="startMatch()">LANCER LE MATCH</button>
    </div>

    <div id="score-screen">
        <div class="logo-trak" style="font-size: 20px; margin: 10px 0;">Match en cours</div>
        <button id="btnA" class="btn-point vert" onclick="addPoint('scoreA')"></button>
        <button id="btnB" class="btn-point bleu" onclick="addPoint('scoreB')"></button>
        <div style="display: flex; justify-content: center; width: 100%; margin-top: 15px;">
            <button class="btn-action" onclick="undo()">↩ ANNULER</button>
            <button class="btn-action" style="background: #800;" onclick="resetMatch()">⚠ RESET</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, get, onValue, update, remove, push, query, limitToLast } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyCjlHL7GEXFvnrNzZAIEZyl-WCqUI3txiM", authDomain: "scoretrak-123.firebaseapp.com", databaseURL: "https://scoretrak-123-default-rtdb.europe-west1.firebasedatabase.app", projectId: "scoretrak-123" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const matchRef = ref(db, 'match/terrain1');
        const historyRef = ref(db, 'history/terrain1');

        onValue(matchRef, (snap) => {
            const d = snap.val();
            const init = document.getElementById('init-screen'), setup = document.getElementById('setup-screen'), score = document.getElementById('score-screen');
            if (!d || d.status === 'idle') { init.style.display = 'flex'; setup.style.display = 'none'; score.style.display = 'none'; }
            else if (d.status === 'setup') { init.style.display = 'none'; setup.style.display = 'flex'; score.style.display = 'none'; }
            else if (d.status === 'active') {
                init.style.display = 'none'; setup.style.display = 'none'; score.style.display = 'flex';
                document.getElementById('btnA').innerHTML = `${d.pA1}<br>${d.pA2}`;
                document.getElementById('btnB').innerHTML = `${d.pB1}<br>${d.pB2}`;
            }
        });

        window.goToSetup = () => update(matchRef, { status: 'setup' });
        
        window.shareToWatch = async () => {
            const watchLink = "https://score-trak.vercel.app/WATCHV5.html"; 
            if (navigator.share) {
                try { await navigator.share({ title: 'ScoreTrak Watch', url: watchLink }); } catch (err) {}
            } else { navigator.clipboard.writeText(watchLink); alert("Lien copié !"); }
        };

        window.startMatch = () => {
            const config = {
                status: 'active',
                pA1: document.getElementById('pA1').value || "Vert 1",
                pA2: document.getElementById('pA2').value || "Vert 2",
                pB1: document.getElementById('pB1').value || "Bleu 1",
                pB2: document.getElementById('pB2').value || "Bleu 2",
                scoreA: 0, scoreB: 0, gamesA: 0, gamesB: 0, setsA: 0, setsB: 0,
                serverTeam: document.getElementById('firstTeam').value,
                rule: document.getElementById('gameRule').value,
                maxSets: parseInt(document.getElementById('maxSets').value),
                serverNum: 1, totalGames: 0, winner: null
            };
            remove(historyRef);
            set(matchRef, config);
        };

        window.addPoint = async (team) => {
            const snap = await get(matchRef);
            let d = snap.val();
            if (!d || d.winner) return;
            await push(historyRef, JSON.stringify(d));
            
            // Note: La logique de points complète (Tie-break, sets, etc.) 
            // est gérée dans la version Watch. Ici c'est simplifié pour le test.
            d[team]++; 
            set(matchRef, d);
        };

        window.undo = async () => {
            const hSnap = await get(query(historyRef, limitToLast(1)));
            if (hSnap.exists()) {
                const key = Object.keys(hSnap.val())[0];
                set(matchRef, JSON.parse(hSnap.val()[key]));
                remove(ref(db, `history/terrain1/${key}`));
            }
        };

        window.resetMatch = () => {
            if(confirm("Fin du match ?")) set(matchRef, { status: 'idle' });
        };
    </script>
</body>
</html>
