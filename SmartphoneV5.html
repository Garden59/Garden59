<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>ScoreTrak Remote</title>
    <style>
        body { background:#000; color:#fff; font-family:sans-serif; text-align:center; margin:0; padding:15px; }
        #court-info { background: #ccff00; color: #000; padding: 10px; font-weight: 900; font-size: 12px; text-transform: uppercase; margin-bottom: 20px; border-radius: 0 0 15px 15px; }
        .setup-box { background: #111; border: 1px solid #333; padding: 20px; border-radius: 20px; }
        input { width: 90%; padding: 15px; margin: 8px 0; border-radius: 12px; border: none; background: #222; color: #fff; font-size: 16px; }
        .btn-main { background: #ccff00; color: #000; padding: 20px; width: 90%; border-radius: 15px; font-weight: bold; border: none; font-size: 18px; margin-top: 20px; }
        .btn-point { width: 100%; padding: 40px 0; border: none; border-radius: 20px; color: #fff; font-size: 24px; font-weight: bold; margin: 10px 0; }
        .vert { background: #2E7D32; } .bleu { background: #1565C0; }
        .serving { border: 5px solid #ccff00; box-shadow: 0 0 15px #ccff00; }
    </style>
</head>
<body>

    <div id="court-info">Connexion au terrain...</div>

    <div id="view-setup" style="display:none;">
        <h2 style="color:#ccff00; letter-spacing: -1px;">PRÉPARATION</h2>
        <div class="setup-box">
            <input type="text" id="pA1" placeholder="Vert 1">
            <input type="text" id="pA2" placeholder="Vert 2">
            <hr style="border:0; border-top:1px solid #333; margin:10px 0;">
            <input type="text" id="pB1" placeholder="Bleu 1">
            <input type="text" id="pB2" placeholder="Bleu 2">
        </div>
        <button class="btn-main" onclick="startMatch()">LANCER LE MATCH</button>
    </div>

    <div id="view-score" style="display:none;">
        <button id="btnA" class="btn-point vert" onclick="addPoint('scoreA')"></button>
        <button id="btnB" class="btn-point bleu" onclick="addPoint('scoreB')"></button>
        <button onclick="resetMatch()" style="background:#300; color:#f44; border:none; padding:15px; border-radius:10px; margin-top:30px; font-weight:bold; font-size:11px;">RÉINITIALISER (QUITTER LE MATCH)</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, get, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        
        const fbConfig = { apiKey: "AIzaSyCjlHL7GEXFvnrNzZAIEZyl-WCqUI3txiM", authDomain: "scoretrak-123.firebaseapp.com", databaseURL: "https://scoretrak-123-default-rtdb.europe-west1.firebasedatabase.app", projectId: "scoretrak-123" };
        const app = initializeApp(fbConfig); const db = getDatabase(app);

        const params = new URLSearchParams(window.location.search);
        const clubId = params.get('clubId');
        const courtId = params.get('courtId');

        if(!clubId || !courtId) {
            document.body.innerHTML = "<h2 style='color:red; padding:40px;'>ERREUR D'IDENTIFIANTS<br><small>Scannez le QR Code sur la TV</small></h2>";
        }

        const mRef = ref(db, `clubs/${clubId}/courts/${courtId}`);

        // --- SYNCHRONISATION EN DIRECT ---
        onValue(mRef, (snap) => {
            const d = snap.val();
            if(!d) return;

            // Mise à jour du bandeau haut
            document.getElementById('court-info').innerText = d.name || "Terrain Connecté";

            // LOGIQUE DE COMMANDE TV : 
            // Si le terrain est en mode 'idle' (Pub), on force le passage en 'setup'
            // pour que la TV quitte les publicités dès que le smartphone est ouvert.
            if (d.status === 'idle') {
                update(mRef, { status: 'setup' });
                return; 
            }

            const setupView = document.getElementById('view-setup');
            const scoreView = document.getElementById('view-score');

            if(d.status === 'active') {
                setupView.style.display = 'none';
                scoreView.style.display = 'block';
                document.getElementById('btnA').innerHTML = `${d.pA1}<br>${d.pA2}`;
                document.getElementById('btnB').innerHTML = `${d.pB1}<br>${d.pB2}`;
                document.getElementById('btnA').classList.toggle('serving', d.serverTeam==='A');
                document.getElementById('btnB').classList.toggle('serving', d.serverTeam==='B');
            } else {
                setupView.style.display = 'block';
                scoreView.style.display = 'none';
            }
        });

        // --- ACTIONS ---
        window.startMatch = () => {
            update(mRef, {
                status: 'active',
                pA1: document.getElementById('pA1').value || "JOUEUR 1",
                pA2: document.getElementById('pA2').value || "JOUEUR 2",
                pB1: document.getElementById('pB1').value || "JOUEUR 1",
                pB2: document.getElementById('pB2').value || "JOUEUR 2",
                scoreA: 0, scoreB: 0, gamesA: 0, gamesB: 0, setsA: 0, setsB: 0,
                serverTeam: 'A', serverNum: 1, maxSets: 2, winner: null
            });
        };

        window.addPoint = async (team) => {
            const snap = await get(mRef);
            let d = snap.val();
            if(!d || d.winner) return;
            
            // Logique de point simplifiée pour le test
            const other = (team === 'scoreA') ? 'scoreB' : 'scoreA';
            if (d[team] === 3) { // Victoire de jeu sur 40-xx
                d.scoreA = 0; d.scoreB = 0;
                d[team === 'scoreA' ? 'gamesA' : 'gamesB']++;
                d.serverTeam = d.serverTeam === 'A' ? 'B' : 'A';
            } else {
                d[team]++;
            }
            set(mRef, d);
        };

        window.resetMatch = () => {
            if(confirm("Voulez-vous quitter le match et remettre la TV en veille ?")) {
                update(mRef, { status: 'idle', winner: null });
            }
        };
    </script>
</body>
</html>
