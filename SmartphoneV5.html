<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>ScoreTrak Admin</title>
    <style>
        body { background:#000; color:#fff; font-family:sans-serif; text-align:center; padding:15px; margin:0; }
        .btn { width:100%; padding:40px 0; border:none; border-radius:20px; color:#fff; font-size:24px; font-weight:bold; margin:10px 0; }
        .v { background:#2E7D32; } .b { background:#1565C0; }
        input { width:90%; padding:15px; margin:5px 0; border-radius:10px; border:none; background:#222; color:#fff; }
    </style>
</head>
<body>
    <div id="debug-msg" style="color:red; font-size:10px;"></div>

    <div id="setup">
        <h2 style="color:#ccff00">CONFIGURATION</h2>
        <input type="text" id="pA1" placeholder="Vert 1"><input type="text" id="pA2" placeholder="Vert 2">
        <input type="text" id="pB1" placeholder="Bleu 1"><input type="text" id="pB2" placeholder="Bleu 2">
        <button onclick="start()" style="background:#ccff00; color:#000; padding:20px; width:90%; border-radius:15px; font-weight:bold; margin-top:20px; border:none;">LANCER MATCH</button>
    </div>

    <div id="score" style="display:none">
        <button id="btnA" class="btn v" onclick="add('scoreA')"></button>
        <button id="btnB" class="btn b" onclick="add('scoreB')"></button>
        <button onclick="reset()" style="background:#400; color:#fff; border:none; padding:15px; border-radius:10px; margin-top:30px">RESET TERRAIN</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, get, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        
        const fbConfig = { apiKey: "AIzaSyCjlHL7GEXFvnrNzZAIEZyl-WCqUI3txiM", authDomain: "scoretrak-123.firebaseapp.com", databaseURL: "https://scoretrak-123-default-rtdb.europe-west1.firebasedatabase.app", projectId: "scoretrak-123" };
        const app = initializeApp(fbConfig); const db = getDatabase(app);

        // LECTURE DES PARAMÈTRES
        const urlParams = new URLSearchParams(window.location.search);
        const clubId = urlParams.get('clubId');
        const courtId = urlParams.get('courtId');

        // DEBUG VISUEL
        if(!clubId || !courtId) {
            document.getElementById('debug-msg').innerText = `ERREUR : Club=${clubId} | Court=${courtId}`;
            alert("ERREUR : IDs MANQUANTS DANS L'URL");
        }

        const mRef = ref(db, `clubs/${clubId}/courts/${courtId}`);

        onValue(mRef, snap => {
            const d = snap.val(); if(!d) return;
            if(d.status === 'active') {
                document.getElementById('setup').style.display='none'; document.getElementById('score').style.display='block';
                document.getElementById('btnA').innerText = `${d.pA1} / ${d.pA2}`;
                document.getElementById('btnB').innerText = `${d.pB1} / ${d.pB2}`;
            } else {
                document.getElementById('setup').style.display='block'; document.getElementById('score').style.display='none';
            }
        });

        window.start = () => {
            update(mRef, { 
                status:'active', 
                pA1:document.getElementById('pA1').value||"V1", pA2:document.getElementById('pA2').value||"V2",
                pB1:document.getElementById('pB1').value||"B1", pB2:document.getElementById('pB2').value||"B2",
                scoreA:0, scoreB:0, gamesA:0, gamesB:0, setsA:0, setsB:0, serverTeam:'A', maxSets:2
            });
        };

        window.add = async (t) => {
            let snap = await get(mRef); let d = snap.val(); if(!d) return;
            d[t] = (d[t] || 0) + 1;
            // Logique de victoire simplifiée pour le test
            if(d[t] > 3) { d[t]=0; d[t==='scoreA'?'gamesA':'gamesB']++; }
            set(mRef, d);
        };

        window.reset = () => { if(confirm("RESET ?")) update(mRef, {status:'idle'}); };
    </script>
</body>
</html>
