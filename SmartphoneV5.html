<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ScoreTrak - Smartphone</title>
    <style>
        body { font-family: sans-serif; background: #000; color: white; text-align: center; margin: 0; padding: 10px; height: 100vh; display: flex; flex-direction: column; }
        
        /* ÉCRAN INITIAL APRÈS RESET */
        #init-screen { display: flex; flex-direction: column; justify-content: center; align-items: center; flex: 1; }
        .btn-init { background: #ccff00; color: black; padding: 30px; border: none; border-radius: 20px; width: 85%; font-size: 20px; font-weight: bold; text-transform: uppercase; cursor: pointer; }

        /* ÉCRAN CONFIGURATION */
        #setup-screen { display: none; flex-direction: column; align-items: center; padding-top: 20px; }
        .logo-trak { font-size: 40px; font-weight: 900; color: #ccff00; font-style: italic; letter-spacing: -2px; margin-bottom: 20px; }
        .team-input { background: #1a1a1a; padding: 15px; border-radius: 12px; margin-bottom: 10px; border-left: 8px solid; width: 85%; text-align: left; }
        input { width: 92%; padding: 12px; margin: 4px 0; border-radius: 6px; border: none; font-size: 15px; background: #333; color: white; }
        .config-box { background: #1a1a1a; padding: 15px; border-radius: 12px; width: 85%; margin-bottom: 15px; text-align: left; }
        select { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 6px; background: #333; color: white; border: none; }
        .btn-start { background: #ccff00; color: black; padding: 20px; border: none; border-radius: 15px; width: 85%; font-size: 18px; font-weight: bold; text-transform: uppercase; }

        /* ÉCRAN SCORE */
        #score-screen { display: none; flex-direction: column; gap: 10px; padding: 10px; flex: 1; }
        .btn-point { flex: 1; border: none; border-radius: 20px; color: white; font-size: 22px; font-weight: bold; text-transform: uppercase; }
        .vert { background: #2E7D32; } .bleu { background: #1565C0; }
        .serving { border: 4px solid #ccff00; box-shadow: 0 0 20px #ccff00; }
        .btn-undo { background: #333; color: #ccc; padding: 15px; border: none; border-radius: 12px; margin-top: 10px; font-weight: bold; }
        .btn-reset { background: #000; color: #444; padding: 10px; border: none; margin-top: 20px; font-size: 11px; }
    </style>
</head>
<body>

    <div id="init-screen">
        <div class="logo-trak" style="margin-bottom: 40px;">ScoreTrak</div>
        <button class="btn-init" onclick="goToSetup()">PRÉPARER LE MATCH</button>
        <p style="color: #444; margin-top: 20px; font-size: 12px;">Cliquez pour configurer le terrain</p>
    </div>

    <div id="setup-screen">
        <div class="logo-trak">ScoreTrak</div>
        <div class="team-input" style="border-color: #4CAF50;">
            <input type="text" id="pA1" placeholder="Serveur 1 (Vert)">
            <input type="text" id="pA2" placeholder="Joueur 2 (Vert)">
        </div>
        <div class="team-input" style="border-color: #2196F3;">
            <input type="text" id="pB1" placeholder="Serveur 1 (Bleu)">
            <input type="text" id="pB2" placeholder="Joueur 2 (Bleu)">
        </div>
        <div class="config-box">
            <select id="firstTeam"><option value="A">VERT ENGAGE</option><option value="B">BLEU ENGAGE</option></select>
            <select id="gameRule"><option value="decisif">POINT DÉCISIF</option><option value="avantage">AVANTAGE</option></select>
            <select id="maxSets"><option value="2">2 SETS GAGNANTS</option><option value="3">3 SETS GAGNANTS</option></select>
        </div>
        <button class="btn-start" onclick="startMatch()">Lancer le Match</button>
    </div>

    <div id="score-screen">
        <button id="btnA" class="btn-point vert" onclick="addPoint('scoreA')"></button>
        <button id="btnB" class="btn-point bleu" onclick="addPoint('scoreB')"></button>
        <button class="btn-undo" onclick="undo()">↩ ANNULER POINT</button>
        <button class="btn-reset" onclick="resetMatch()">FIN DE MATCH / RESET</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, get, onValue, push, query, limitToLast, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyCjlHL7GEXFvnrNzZAIEZyl-WCqUI3txiM", authDomain: "scoretrak-123.firebaseapp.com", databaseURL: "https://scoretrak-123-default-rtdb.europe-west1.firebasedatabase.app", projectId: "scoretrak-123" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const matchRef = ref(db, 'match/terrain1');
        const historyRef = ref(db, 'history/terrain1');

        // GESTION DE L'AFFICHAGE SMARTPHONE
        onValue(matchRef, (snap) => {
            const d = snap.val();
            const init = document.getElementById('init-screen');
            const setup = document.getElementById('setup-screen');
            const score = document.getElementById('score-screen');

            if (!d || d.status === 'idle') {
                init.style.display = 'flex'; setup.style.display = 'none'; score.style.display = 'none';
            } else if (d.status === 'setup') {
                init.style.display = 'none'; setup.style.display = 'flex'; score.style.display = 'none';
            } else if (d.status === 'active') {
                init.style.display = 'none'; setup.style.display = 'none'; score.style.display = 'flex';
                document.getElementById('btnA').innerHTML = `${d.pA1}<br>${d.pA2}`;
                document.getElementById('btnB').innerHTML = `${d.pB1}<br>${d.pB2}`;
                document.getElementById('btnA').classList.toggle('serving', d.serverTeam === 'A');
                document.getElementById('btnB').classList.toggle('serving', d.serverTeam === 'B');
            }
        });

        window.goToSetup = () => {
            update(matchRef, { status: 'setup', active: false });
        };

        window.startMatch = () => {
            remove(historyRef);
            set(matchRef, {
                status: 'active', active: true, winner: null,
                rule: document.getElementById('gameRule').value,
                maxSets: parseInt(document.getElementById('maxSets').value),
                pA1: document.getElementById('pA1').value || "VERT 1", pA2: document.getElementById('pA2').value || "VERT 2",
                pB1: document.getElementById('pB1').value || "BLEU 1", pB2: document.getElementById('pB2').value || "BLEU 2",
                scoreA: 0, scoreB: 0, gamesA: 0, gamesB: 0, setsA: 0, setsB: 0,
                serverTeam: document.getElementById('firstTeam').value, serverNum: 1, totalGames: 0
            });
        };

        window.addPoint = async (team) => {
            const snap = await get(matchRef);
            let d = snap.val();
            if (d.winner) return;
            await push(historyRef, JSON.stringify(d));
            const other = (team === 'scoreA') ? 'scoreB' : 'scoreA';

            if (d.gamesA === 6 && d.gamesB === 6) { // Tie-break
                d[team]++;
                let tt = d.scoreA + d.scoreB;
                if (tt % 2 === 1) d.serverTeam = (d.serverTeam === 'A' ? 'B' : 'A');
                d.serverNum = (Math.floor(tt / 2) % 2) + 1;
                if (d[team] >= 7 && (d[team] - d[other]) >= 2) winGame(d, team);
            } else {
                if (d.rule === 'decisif') { if (d[team] === 3) winGame(d, team); else d[team]++; }
                else {
                    if (d[team] < 3) d[team]++;
                    else if (d[team] === 3 && d[other] < 3) winGame(d, team);
                    else if (d[team] === 3 && d[other] === 3) d[team] = 4;
                    else if (d[team] === 4) winGame(d, team);
                    else if (d[team] === 3 && d[other] === 4) d[other] = 3;
                }
            }
            set(matchRef, d);
        };

        function winGame(d, team) {
            d.scoreA = 0; d.scoreB = 0; d[team === 'scoreA' ? 'gamesA' : 'gamesB']++; d.totalGames++;
            d.serverTeam = (d.serverTeam === 'A' ? 'B' : 'A');
            d.serverNum = (Math.floor(d.totalGames / 2) % 2) + 1;
            if (((d.gamesA >= 6 || d.gamesB >= 6) && Math.abs(d.gamesA - d.gamesB) >= 2) || d.gamesA === 7 || d.gamesB === 7) finishSet(d, team);
        }

        function finishSet(d, team) {
            d.gamesA = 0; d.gamesB = 0; d.scoreA = 0; d.scoreB = 0; d.totalGames = 0;
            d[team === 'scoreA' ? 'setsA' : 'setsB']++;
            if (d.setsA >= d.maxSets) d.winner = 'A';
            if (d.setsB >= d.maxSets) d.winner = 'B';
        }

        window.undo = async () => {
            const histSnap = await get(query(historyRef, limitToLast(1)));
            if (histSnap.exists()) {
                const key = Object.keys(histSnap.val())[0];
                const prevData = JSON.parse(histSnap.val()[key]);
                await set(matchRef, prevData);
                await remove(ref(db, `history/terrain1/${key}`));
            }
        };

        window.resetMatch = () => { 
            if(confirm("Fin du match ?")) {
                set(matchRef, { status: 'idle', active: false }); 
                remove(historyRef);
            }
        };
    </script>
</body>
</html>
