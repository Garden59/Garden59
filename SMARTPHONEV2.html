<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ScoreTrak Admin V5</title>
    <style>
        body { font-family: system-ui, sans-serif; background: #000; color: white; text-align: center; margin: 0; padding: 10px; height: 100vh; display: flex; flex-direction: column; box-sizing: border-box; }
        .logo-trak { font-size: 40px; font-weight: 900; color: #ccff00; font-style: italic; margin: 15px 0; }
        #init-screen, #setup-screen, #score-screen { display: none; flex-direction: column; align-items: center; justify-content: center; flex: 1; }
        .team-input { background: #1a1a1a; padding: 12px; border-radius: 12px; margin-bottom: 8px; border-left: 8px solid; width: 88%; text-align: left; }
        input, select { width: 92%; padding: 12px; margin: 4px 0; border-radius: 8px; border: none; background: #333; color: white; font-size: 15px; }
        .btn-start { background: #ccff00; color: black; padding: 18px; border: none; border-radius: 15px; width: 88%; font-weight: bold; text-transform: uppercase; font-size: 16px; margin-top: 10px; }
        .btn-point { width: 92%; padding: 35px 0; border: none; border-radius: 20px; color: white; font-size: 20px; font-weight: bold; text-transform: uppercase; margin: 8px 0; }
        .vert { background: #2E7D32; } .bleu { background: #1565C0; }
        .serving { border: 4px solid #ccff00; }
        .btn-action { background: #333; color: white; padding: 15px; border: none; border-radius: 12px; width: 44%; margin: 5px; font-weight: bold; font-size: 12px; }
    </style>
</head>
<body>

    <div id="init-screen" style="display: flex;">
        <div class="logo-trak">ScoreTrak</div>
        <div id="court-label" style="margin-bottom: 20px; color: #666;">Terrain...</div>
        <button class="btn-start" onclick="goToSetup()">PRÉPARER LE MATCH</button>
    </div>

    <div id="setup-screen">
        <div class="logo-trak" style="font-size: 22px;">Configuration</div>
        <div class="team-input" style="border-color: #4CAF50;"><input type="text" id="pA1" placeholder="Vert 1"><input type="text" id="pA2" placeholder="Vert 2"></div>
        <div class="team-input" style="border-color: #2196F3;"><input type="text" id="pB1" placeholder="Bleu 1"><input type="text" id="pB2" placeholder="Bleu 2"></div>
        <div style="width: 88%; text-align: left;">
            <label style="font-size: 11px; color:#888;">FORMAT</label>
            <select id="maxSets"><option value="2">2 SETS GAGNANTS</option><option value="3">3 SETS GAGNANTS</option></select>
            <label style="font-size: 11px; color:#888;">RÈGLE 40-40</label>
            <select id="rule"><option value="decisif">POINT DÉCISIF</option><option value="avantage">AVANTAGE</option></select>
        </div>
        <button class="btn-start" onclick="startMatch()">LANCER</button>
    </div>

    <div id="score-screen">
        <button id="btnA" class="btn-point vert" onclick="addPoint('scoreA')"></button>
        <button id="btnB" class="btn-point bleu" onclick="addPoint('scoreB')"></button>
        <div style="display: flex; width: 100%; justify-content: center; margin-top: 15px;">
            <button class="btn-action" onclick="undo()">↩ ANNULER</button>
            <button class="btn-action" style="background: #800;" onclick="resetMatch()">⚠ RESET</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, get, onValue, update, remove, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const fbConfig = { apiKey: "AIzaSyCjlHL7GEXFvnrNzZAIEZyl-WCqUI3txiM", authDomain: "scoretrak-123.firebaseapp.com", databaseURL: "https://scoretrak-123-default-rtdb.europe-west1.firebasedatabase.app", projectId: "scoretrak-123" };
        const app = initializeApp(fbConfig);
        const db = getDatabase(app);

        const params = new URLSearchParams(window.location.search);
        const clubId = params.get('clubId');
        const courtId = params.get('courtId');
        const mRef = ref(db, `clubs/${clubId}/courts/${courtId}`);

        onValue(mRef, (snap) => {
            const d = snap.val(); if(!d) return;
            document.getElementById('court-label').innerText = d.name || "Terrain";
            const init = document.getElementById('init-screen'), setup = document.getElementById('setup-screen'), score = document.getElementById('score-screen');
            if (d.status === 'idle') { init.style.display = 'flex'; setup.style.display = 'none'; score.style.display = 'none'; }
            else if (d.status === 'setup') { init.style.display = 'none'; setup.style.display = 'flex'; score.style.display = 'none'; }
            else if (d.status === 'active') {
                init.style.display = 'none'; setup.style.display = 'none'; score.style.display = 'flex';
                document.getElementById('btnA').innerHTML = `${d.pA1}<br>${d.pA2}`;
                document.getElementById('btnB').innerHTML = `${d.pB1}<br>${d.pB2}`;
                document.getElementById('btnA').classList.toggle('serving', d.serverTeam === 'A');
                document.getElementById('btnB').classList.toggle('serving', d.serverTeam === 'B');
            }
        });

        window.goToSetup = () => update(mRef, { status: 'setup' });
        window.startMatch = () => {
            update(mRef, {
                status: 'active', winner: null,
                rule: document.getElementById('rule').value,
                maxSets: parseInt(document.getElementById('maxSets').value),
                pA1: document.getElementById('pA1').value || "VERT 1", pA2: document.getElementById('pA2').value || "VERT 2",
                pB1: document.getElementById('pB1').value || "BLEU 1", pB2: document.getElementById('pB2').value || "BLEU 2",
                scoreA: 0, scoreB: 0, gamesA: 0, gamesB: 0, setsA: 0, setsB: 0,
                serverTeam: 'A', serverNum: 1, totalGames: 0
            });
        };

        window.addPoint = async (team) => {
            const snap = await get(mRef); let d = snap.val(); if(!d || d.winner) return;
            const other = (team === 'scoreA') ? 'scoreB' : 'scoreA';
            if (d.gamesA === 6 && d.gamesB === 6) { // TB
                d[team]++;
                if (d[team] >= 7 && (d[team] - d[other]) >= 2) winGame(d, team);
            } else {
                if (d.rule === 'decisif') { if (d[team] === 3) winGame(d, team); else d[team]++; }
                else {
                    if (d[team] < 3) d[team]++;
                    else if (d[team] === 3 && d[other] < 3) winGame(d, team);
                    else if (d[team] === 3 && d[other] === 3) d[team] = 4;
                    else if (d[team] === 4) winGame(d, team);
                    else if (d[team] === 3 && d[other] === 4) d[other] = 3;
                }
            }
            set(mRef, d);
        };

        function winGame(d, team) {
            d.scoreA = 0; d.scoreB = 0;
            d[team === 'scoreA' ? 'gamesA' : 'gamesB']++;
            if (((d.gamesA >= 6 || d.gamesB >= 6) && Math.abs(d.gamesA - d.gamesB) >= 2) || d.gamesA === 7 || d.gamesB === 7) {
                const idx = (d.setsA || 0) + (d.setsB || 0) + 1;
                d['s' + idx + 'A'] = d.gamesA; d['s' + idx + 'B'] = d.gamesB;
                d.gamesA = 0; d.gamesB = 0;
                d[team === 'scoreA' ? 'setsA' : 'setsB']++;
                if (d.setsA >= d.maxSets) d.winner = 'A';
                if (d.setsB >= d.maxSets) d.winner = 'B';
            }
        }

        window.resetMatch = () => { if(confirm("RESET ?")) update(mRef, { status: 'idle' }); };
    </script>
</body>
</html>
