<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>ScoreTrak SuperAdmin - Monitoring Pro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Roboto:wght@400;700;900&display=swap');
        :root { --padel-yellow: #ccff00; --padel-blue: #00d2ff; --bg: #000; --card: #0d0d0d; --border: #222; }
        
        body { background: var(--bg); color: white; font-family: 'Roboto', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* SIDEBAR */
        #sidebar { width: 260px; background: #050505; border-right: 1px solid var(--border); padding: 25px; display: flex; flex-direction: column; }
        .logo { font-family: 'Orbitron'; color: var(--padel-yellow); font-size: 22px; margin-bottom: 40px; font-style: italic; font-weight: 900; }
        .nav-item { padding: 14px; cursor: pointer; border-radius: 10px; margin-bottom: 8px; color: #666; transition: 0.3s; font-weight: bold; }
        .nav-item.active { background: var(--padel-yellow); color: #000; }
        .nav-item:hover:not(.active) { color: #fff; background: #111; }

        #main { flex: 1; padding: 40px; overflow-y: auto; }
        .view { display: none; } .view.active { display: block; }

        /* FILTRES */
        .filter-bar { display: flex; gap: 15px; margin-bottom: 30px; background: #111; padding: 15px; border-radius: 15px; border: 1px solid var(--border); align-items: center; }
        .search-input { flex: 1; background: #000; border: 1px solid #333; padding: 12px; border-radius: 8px; color: white; }
        .select-club { background: #000; color: white; border: 1px solid #333; padding: 12px; border-radius: 8px; min-width: 200px; }

        /* GRID MONITORING */
        .monitor-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 20px; }
        .monitor-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 20px; position: relative; transition: 0.3s; }
        .monitor-card.live { border-color: var(--padel-yellow); box-shadow: 0 0 15px rgba(204, 255, 0, 0.05); }
        .monitor-card.finished { border-color: #ff4444; opacity: 0.9; }

        .status-badge { font-size: 10px; font-weight: 900; padding: 4px 10px; border-radius: 5px; text-transform: uppercase; }
        .badge-live { background: rgba(204, 255, 0, 0.1); color: var(--padel-yellow); }
        .badge-finish { background: rgba(255, 68, 68, 0.1); color: #ff4444; }

        .monitor-names { font-size: 14px; font-weight: 900; color: #fff; text-transform: uppercase; margin-bottom: 5px; }
        .monitor-sets { font-size: 12px; color: var(--padel-blue); margin-bottom: 10px; display: flex; gap: 8px; }
        .set-box { background: #1a1a1a; padding: 2px 6px; border-radius: 4px; border: 1px solid #333; }

        .monitor-score-row { display: flex; justify-content: space-between; align-items: center; background: #000; padding: 12px; border-radius: 10px; margin-top: 5px; }
        .score-val { font-family: 'Orbitron'; font-size: 22px; color: var(--padel-yellow); }

        /* CONFIG */
        .club-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 25px; margin-bottom: 25px; }
        .btn-action { cursor: pointer; border: none; border-radius: 8px; font-weight: bold; }
        .btn-reset { background: #1a0000; color: #ff4444; width: 100%; padding: 10px; margin-top: 15px; border: 1px solid #300; }
        .btn-copy { background: var(--padel-blue); color: #000; padding: 8px 12px; font-size: 11px; }

        /* AUTH */
        #login-overlay { position: fixed; inset: 0; background: #000; z-index: 2000; display: flex; justify-content: center; align-items: center; }
        .login-box { background: #0a0a0a; padding: 40px; border-radius: 30px; border: 1px solid var(--padel-yellow); text-align: center; width: 320px; }
        input[type="text"], input[type="password"] { width: 100%; background: #000; border: 1px solid #333; padding: 12px; color: white; border-radius: 8px; box-sizing: border-box; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <div class="logo">ScoreTrak Admin</div>
            <input type="text" id="adm-u" placeholder="Identifiant">
            <input type="password" id="adm-p" placeholder="Mot de passe">
            <button onclick="login()" style="background:var(--padel-yellow); color:000; padding:15px; width:100%; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">CONNEXION</button>
        </div>
    </div>

    <div id="sidebar">
        <div class="logo">ScoreTrak</div>
        <div class="nav-item active" id="nav-dash" onclick="showView('dash')">📊 Monitoring Live</div>
        <div class="nav-item" id="nav-conf" onclick="showView('conf')">⚙️ Configuration</div>
    </div>

    <div id="main">
        <div id="view-dash" class="view active">
            <h1 style="font-family:Orbitron;">SURVEILLANCE <span style="color:var(--padel-yellow)">RÉSEAU</span></h1>
            
            <div class="filter-bar">
                <select id="filter-club" class="select-club" onchange="renderDashboard()">
                    <option value="all">Tous les Clubs</option>
                </select>
                <input type="text" id="search-court" class="search-input" placeholder="Rechercher un terrain par son nom..." onkeyup="renderDashboard()">
            </div>

            <div class="monitor-grid" id="monitor-list"></div>
        </div>

        <div id="view-conf" class="view">
            <h1 style="font-family:Orbitron;">CONFIGURATION <span style="color:var(--padel-yellow)">CLUBS</span></h1>
            <div class="club-card" style="border-color: var(--padel-yellow);">
                <h3 style="margin-top:0">Nouveau Club</h3>
                <div style="display:flex; gap:10px;">
                    <input type="text" id="new-club-name" placeholder="Nom du Club" style="margin-bottom:0">
                    <button onclick="createClub()" style="background:var(--padel-yellow); color:#000; border:none; padding:12px 25px; border-radius:8px; font-weight:bold; cursor:pointer;">CRÉER</button>
                </div>
            </div>
            <div id="club-mgmt-list"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, set, push, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const fbConfig = { apiKey: "AIzaSyCjlHL7GEXFvnrNzZAIEZyl-WCqUI3txiM", authDomain: "scoretrak-123.firebaseapp.com", databaseURL: "https://scoretrak-123-default-rtdb.europe-west1.firebasedatabase.app", projectId: "scoretrak-123" };
        const app = initializeApp(fbConfig); const db = getDatabase(app);

        let fullData = {};
        const TV_URL = "https://score-trak.vercel.app/PUB.html";

        window.login = () => {
            if(document.getElementById('adm-u').value === "master" && document.getElementById('adm-p').value === "score2026") {
                document.getElementById('login-overlay').style.display = 'none';
                sync();
            } else alert("Erreur identifiants");
        };

        window.showView = (v) => {
            document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
            document.getElementById('view-'+v).classList.add('active');
            document.getElementById('nav-'+v).classList.add('active');
        };

        function sync() {
            onValue(ref(db, 'clubs'), snap => {
                fullData = snap.val() || {};
                updateClubFilter();
                renderDashboard();
                renderManagement();
            });
        }

        function updateClubFilter() {
            const select = document.getElementById('filter-club');
            const current = select.value;
            select.innerHTML = '<option value="all">Tous les Clubs</option>';
            Object.keys(fullData).forEach(id => {
                select.innerHTML += `<option value="${id}">${fullData[id].name}</option>`;
            });
            select.value = current;
        }

        window.renderDashboard = () => {
            const list = document.getElementById('monitor-list');
            const clubFilter = document.getElementById('filter-club').value;
            const searchTerm = document.getElementById('search-court').value.toLowerCase();
            list.innerHTML = "";

            Object.keys(fullData).forEach(clubId => {
                if (clubFilter !== 'all' && clubFilter !== clubId) return;

                const club = fullData[clubId];
                if (!club.courts) return;

                Object.keys(club.courts).forEach(courtId => {
                    const c = club.courts[courtId];
                    if (searchTerm && !c.name.toLowerCase().includes(searchTerm)) return;

                    const isFini = c.winner != null;
                    const isLive = c.status === 'active' && !isFini;

                    // Construction des sets terminés
                    let setsA = "", setsB = "";
                    for(let i=1; i<=3; i++) { // On check les 3 premiers sets
                        if(c['s'+i+'A'] !== undefined) {
                            setsA += `<span class="set-box">${c['s'+i+'A']}</span> `;
                            setsB += `<span class="set-box">${c['s'+i+'B']}</span> `;
                        }
                    }

                    const card = document.createElement('div');
                    card.className = `monitor-card ${isLive?'live':''} ${isFini?'finished':''}`;
                    card.innerHTML = `
                        <div class="monitor-header">
                            <div>
                                <div style="font-size:10px; color:var(--padel-blue); font-weight:900;">${club.name}</div>
                                <div style="font-weight:900; font-size:18px;">${c.name}</div>
                            </div>
                            <div class="status-badge ${isFini?'badge-finish':'badge-live'}">
                                ${isFini ? 'MATCH TERMINÉ' : (isLive ? 'LIVE' : 'IDLE')}
                            </div>
                        </div>

                        <div class="monitor-names">${c.pA1} / ${c.pA2}</div>
                        <div class="monitor-sets">${setsA || '<span style="color:#333">Aucun set</span>'}</div>
                        <div class="monitor-score-row">
                            <span style="font-size:11px; color:#555">SCORE ACTUEL</span>
                            <span class="score-val">${isFini ? c.gamesA : (c.scoreA || 0)}</span>
                        </div>

                        <div class="monitor-names" style="margin-top:15px">${c.pB1} / ${c.pB2}</div>
                        <div class="monitor-sets">${setsB || '<span style="color:#333">Aucun set</span>'}</div>
                        <div class="monitor-score-row">
                            <span style="font-size:11px; color:#555">SCORE ACTUEL</span>
                            <span class="score-val">${isFini ? c.gamesB : (c.scoreB || 0)}</span>
                        </div>

                        <button class="btn-action btn-reset" onclick="resetCourt('${clubId}','${courtId}')">
                            RÉINITIALISER LE TERRAIN
                        </button>
                    `;
                    list.appendChild(card);
                });
            });
        };

        function renderManagement() {
            const container = document.getElementById('club-mgmt-list');
            container.innerHTML = "";
            Object.keys(fullData).forEach(cid => {
                const club = fullData[cid];
                let courtsHtml = "";
                if(club.courts) {
                    Object.keys(club.courts).forEach(tid => {
                        const url = `${TV_URL}?clubId=${cid}&courtId=${tid}`;
                        courtsHtml += `
                            <div style="display:flex; justify-content:space-between; background:#111; padding:10px; border-radius:8px; margin-bottom:5px; border:1px solid #222; align-items:center;">
                                <span style="font-weight:bold">${club.courts[tid].name}</span>
                                <div>
                                    <button class="btn-action btn-copy" onclick="copy('${url}')">🔗 LIEN TV</button>
                                    <button onclick="deleteCourt('${cid}','${tid}')" style="background:none; color:#f44; border:none; cursor:pointer; margin-left:10px">🗑️</button>
                                </div>
                            </div>`;
                    });
                }
                container.innerHTML += `
                    <div class="club-card">
                        <div style="display:flex; justify-content:space-between; margin-bottom:15px; border-bottom:1px solid #222; padding-bottom:10px">
                            <h2 style="margin:0; color:var(--padel-blue)">${club.name}</h2>
                            <button onclick="deleteClub('${cid}')" style="background:none; border:none; color:#444; font-size:10px; cursor:pointer">SUPPRIMER CLUB</button>
                        </div>
                        ${courtsHtml}
                        <div style="display:flex; gap:10px; margin-top:15px">
                            <input type="text" id="in-${cid}" placeholder="Nom du terrain" style="margin-bottom:0">
                            <button onclick="addCourt('${cid}')" style="background:var(--padel-blue); color:#000; border:none; padding:10px 20px; border-radius:8px; font-weight:bold; cursor:pointer">+</button>
                        </div>
                    </div>`;
            });
        }

        // --- ACTIONS FIREBASE ---
        window.createClub = () => { const n = document.getElementById('new-club-name').value; if(n) { push(ref(db, 'clubs'), {name:n}); document.getElementById('new-club-name').value=""; } };
        window.addCourt = (cid) => {
            const n = document.getElementById('in-'+cid).value;
            if(n) push(ref(db, `clubs/${cid}/courts`), { 
                name:n, status:'idle', pA1:'Joueur 1', pA2:'Joueur 2', pB1:'Joueur 1', pB2:'Joueur 2', 
                scoreA:0, scoreB:0, gamesA:0, gamesB:0, setsA:0, setsB:0, serverTeam:'A' 
            });
        };
        window.resetCourt = (cid, tid) => { if(confirm("Voulez-vous forcer le reset ?")) update(ref(db, `clubs/${cid}/courts/${tid}`), {status:'idle', winner:null, scoreA:0, scoreB:0, gamesA:0, gamesB:0, setsA:0, setsB:0, s1A:null, s1B:null, s2A:null, s2B:null, s3A:null, s3B:null}); };
        window.deleteCourt = (cid, tid) => { if(confirm("Supprimer ce terrain ?")) remove(ref(db, `clubs/${cid}/courts/${tid}`)); };
        window.deleteClub = (cid) => { if(confirm("Supprimer tout le club ?")) remove(ref(db, `clubs/${cid}`)); };
        window.copy = (t) => { navigator.clipboard.writeText(t); alert("URL Copiée !"); };

    </script>
</body>
</html>
