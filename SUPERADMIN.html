<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>ScoreTrak - Super Admin</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Roboto:wght@400;700;900&display=swap');
        :root { --padel-yellow: #ccff00; --padel-blue: #00d2ff; --bg-dark: #000; --card-bg: #0a0a0a; --border: #222; }
        body { background: var(--bg-dark); color: white; font-family: 'Roboto', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: 260px; background: #050505; border-right: 1px solid var(--border); padding: 25px; display: flex; flex-direction: column; }
        .logo { font-family: 'Orbitron'; color: var(--padel-yellow); font-size: 22px; margin-bottom: 40px; font-style: italic; font-weight: 900; }
        .nav-item { padding: 14px; cursor: pointer; border-radius: 10px; margin-bottom: 8px; color: #666; transition: 0.3s; font-weight: bold; display: flex; align-items: center; gap: 10px; }
        .nav-item:hover { background: #111; color: #aaa; }
        .nav-item.active { background: var(--padel-yellow); color: #000; }
        #main-content { flex: 1; padding: 40px; overflow-y: auto; background: linear-gradient(135deg, #000 0%, #050505 100%); }
        .view-section { display: none; }
        .view-section.active { display: block; }
        .monitoring-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; }
        .court-monitor { background: var(--card-bg); border: 1px solid var(--border); border-radius: 20px; padding: 20px; }
        .court-monitor.active { border-color: var(--padel-yellow); }
        .club-listing { background: #080808; border-radius: 15px; padding: 20px; border: 1px solid var(--border); margin-bottom: 20px; }
        .court-row { display: flex; align-items: center; justify-content: space-between; background: #111; padding: 10px; border-radius: 10px; margin-bottom: 8px; }
        button.primary { background: var(--padel-yellow); border: none; padding: 12px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-copy { background: var(--padel-blue); color: #000; border: none; padding: 6px 12px; border-radius: 5px; font-size: 11px; font-weight: 900; cursor: pointer; }
        input { background: #000; border: 1px solid #333; padding: 12px; border-radius: 8px; color: white; width: 100%; margin-bottom: 10px; box-sizing: border-box; }
        #login-overlay { position: fixed; inset: 0; background: #000; z-index: 2000; display: flex; justify-content: center; align-items: center; }
        .login-box { background: #0a0a0a; padding: 40px; border-radius: 20px; border: 1px solid var(--padel-yellow); text-align: center; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: #333; }
        .dot.live { background: var(--padel-yellow); box-shadow: 0 0 10px var(--padel-yellow); }
    </style>
</head>
<body>
    <div id="login-overlay"><div class="login-box"><div class="logo">ScoreTrak Admin</div><input type="text" id="adm-u" placeholder="Identifiant"><input type="password" id="adm-p" placeholder="Mot de passe"><button class="primary" onclick="login()" style="width:100%">CONNEXION</button></div></div>

    <div id="sidebar">
        <div class="logo">ScoreTrak</div>
        <div class="nav-item active" id="nav-dash" onclick="showView('dashboard')">📊 Tableau de Bord</div>
        <div class="nav-item" id="nav-config" onclick="showView('config')">⚙️ Configuration</div>
    </div>

    <div id="main-content">
        <div id="view-dashboard" class="view-section active">
            <h1 style="font-family:Orbitron"><span>LIVE</span> MONITORING</h1>
            <div class="monitoring-grid" id="monitor-container"></div>
        </div>
        <div id="view-config" class="view-section">
            <h1 style="font-family:Orbitron"><span>GESTION</span> CLUBS</h1>
            <div class="club-listing" style="border-color: var(--padel-yellow);"><input type="text" id="new-club-name" placeholder="Nom du Club"><button class="primary" onclick="createClub()">+ CRÉER CLUB</button></div>
            <div id="clubs-management-list"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, set, push, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyCjlHL7GEXFvnrNzZAIEZyl-WCqUI3txiM", authDomain: "scoretrak-123.firebaseapp.com", databaseURL: "https://scoretrak-123-default-rtdb.europe-west1.firebasedatabase.app", projectId: "scoretrak-123" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let clubsData = {};
        const TV_URL = "https://score-trak.vercel.app/PUB.html";

        window.login = () => { if(document.getElementById('adm-u').value === "master" && document.getElementById('adm-p').value === "score2026") { document.getElementById('login-overlay').style.display='none'; start(); } else alert("Accès refusé"); };
        window.showView = (v) => { document.querySelectorAll('.view-section').forEach(s=>s.classList.remove('active')); document.getElementById('view-'+v).classList.add('active'); };

        function start() { onValue(ref(db, 'clubs'), snap => { clubsData = snap.val() || {}; renderDashboard(); renderManagement(); }); }

        function renderDashboard() {
            const container = document.getElementById('monitor-container'); container.innerHTML = "";
            Object.keys(clubsData).forEach(clubId => {
                const club = clubsData[clubId]; if(!club.courts) return;
                Object.keys(club.courts).forEach(courtId => {
                    const c = club.courts[courtId]; const live = c.status==='active';
                    container.innerHTML += `<div class="court-monitor ${live?'active':''}">
                        <div style="display:flex;justify-content:space-between"><b>${club.name} - ${c.name}</b><div class="dot ${live?'live':''}"></div></div>
                        <div style="font-size:12px;margin-top:10px;color:#888">${c.pA1||'?'}/${c.pA2||'?'} VS ${c.pB1||'?'}/${c.pB2||'?'}</div>
                        <div style="font-family:Orbitron;color:var(--padel-blue);font-size:20px;margin-top:10px">${c.gamesA||0} - ${c.gamesB||0}</div>
                    </div>`;
                });
            });
        }

        function renderManagement() {
            const container = document.getElementById('clubs-management-list'); container.innerHTML = "";
            Object.keys(clubsData).forEach(clubId => {
                const club = clubsData[clubId];
                let courts = ""; if(club.courts) { Object.keys(club.courts).forEach(courtId => {
                    const url = `${TV_URL}?clubId=${clubId}&courtId=${courtId}`;
                    courts += `<div class="court-row"><span>${club.courts[courtId].name}</span><button class="btn-copy" onclick="copy('${url}')">🔗 LIEN TV</button></div>`;
                });}
                container.innerHTML += `<div class="club-listing"><h3>${club.name}</h3>${courts}<div style="display:flex;gap:10px;margin-top:10px"><input type="text" id="in-${clubId}" placeholder="Nom terrain"><button class="primary" style="padding:10px" onclick="addCourt('${clubId}')">+</button></div></div>`;
            });
        }

        window.createClub = () => { const n = document.getElementById('new-club-name').value; if(n) push(ref(db, 'clubs'), {name: n}); };
        window.addCourt = (clubId) => {
            const n = document.getElementById('in-'+clubId).value;
            if(n) push(ref(db, `clubs/${clubId}/courts`), { 
                name: n, status: 'idle', pA1:"JOUEUR 1", pA2:"JOUEUR 2", pB1:"JOUEUR 1", pB2:"JOUEUR 2",
                scoreA:0, scoreB:0, gamesA:0, gamesB:0, setsA:0, setsB:0, serverTeam:'A'
            });
        };
        window.copy = (t) => { navigator.clipboard.writeText(t); alert("URL Copiée !"); };
    </script>
</body>
</html>
