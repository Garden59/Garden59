<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>ScoreTrak - Super Admin</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Roboto:wght@400;700&display=swap');
        body { background: #000; color: white; font-family: 'Roboto', sans-serif; padding: 30px; }
        .card { background: #0a0a0a; border: 1px solid #222; padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        .logo { font-family: 'Orbitron'; color: #ccff00; font-size: 24px; font-weight: 900; margin-bottom: 30px; }
        .court-row { display: flex; justify-content: space-between; align-items: center; background: #111; padding: 10px; border-radius: 10px; margin-top: 10px; border: 1px solid #333; }
        button { cursor: pointer; border: none; font-weight: bold; border-radius: 5px; padding: 10px; }
        .btn-tv { background: #00d2ff; color: #000; margin-right: 5px; }
        .btn-add { background: #ccff00; color: #000; margin-top: 10px; width: 100%; }
        input { background: #000; color: #fff; border: 1px solid #333; padding: 10px; border-radius: 5px; width: 100%; box-sizing: border-box; }
    </style>
</head>
<body>
    <div class="logo">ScoreTrak Admin</div>
    
    <div class="card" style="border-color: #ccff00;">
        <h3>Nouveau Club</h3>
        <input type="text" id="clubName" placeholder="Nom du Club">
        <button class="btn-add" onclick="createClub()">CRÉER LE CLUB</button>
    </div>

    <div id="display"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, push, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        
        const fbConfig = { apiKey: "AIzaSyCjlHL7GEXFvnrNzZAIEZyl-WCqUI3txiM", authDomain: "scoretrak-123.firebaseapp.com", databaseURL: "https://scoretrak-123-default-rtdb.europe-west1.firebasedatabase.app", projectId: "scoretrak-123" };
        const app = initializeApp(fbConfig); const db = getDatabase(app);

        const BASE_TV = "https://score-trak.vercel.app/PUB.html";

        onValue(ref(db, 'clubs'), snap => {
            const clubs = snap.val() || {};
            const out = document.getElementById('display'); out.innerHTML = "";
            Object.keys(clubs).forEach(clubId => {
                const club = clubs[clubId];
                let courts = "";
                if(club.courts) {
                    Object.keys(club.courts).forEach(courtId => {
                        const url = `${BASE_TV}?clubId=${clubId}&courtId=${courtId}`;
                        courts += `<div class="court-row"><span>${club.courts[courtId].name}</span><button class="btn-tv" onclick="copy('${url}')">🔗 COPIER LIEN TV</button></div>`;
                    });
                }
                out.innerHTML += `<div class="card"><h2>${club.name}</h2>${courts}<div style="margin-top:15px;"><input type="text" id="in-${clubId}" placeholder="Nom terrain"><button class="btn-add" onclick="addCourt('${clubId}')">AJOUTER TERRAIN</button></div></div>`;
            });
        });

        window.createClub = () => { const n = document.getElementById('clubName').value; if(n) push(ref(db, 'clubs'), {name: n}); };
        window.addCourt = (clubId) => {
            const n = document.getElementById('in-'+clubId).value;
            if(n) push(ref(db, `clubs/${clubId}/courts`), { 
                name: n, status: 'idle', pA1:"V1", pA2:"V2", pB1:"B1", pB2:"B2", scoreA:0, scoreB:0, gamesA:0, gamesB:0, setsA:0, setsB:0, serverTeam:'A' 
            });
        };
        window.copy = (t) => { navigator.clipboard.writeText(t); alert("Lien TV Copié !"); };
    </script>
</body>
</html>
