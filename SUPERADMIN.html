<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>ScoreTrak SuperAdmin - Black Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Roboto:wght@400;700;900&display=swap');
        :root { --padel-yellow: #ccff00; --padel-blue: #00d2ff; --bg-dark: #000; --card-bg: #0a0a0a; --border: #222; }
        
        body { background: var(--bg-dark); color: white; font-family: 'Roboto', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* SIDEBAR ORIGINALE */
        #sidebar { width: 260px; background: #050505; border-right: 1px solid var(--border); padding: 25px; display: flex; flex-direction: column; }
        .logo { font-family: 'Orbitron'; color: var(--padel-yellow); font-size: 22px; margin-bottom: 40px; font-style: italic; font-weight: 900; }
        .nav-item { padding: 14px; cursor: pointer; border-radius: 10px; margin-bottom: 8px; color: #666; transition: 0.3s; font-weight: bold; display: flex; align-items: center; gap: 10px; }
        .nav-item:hover { color: #aaa; background: #111; }
        .nav-item.active { background: var(--padel-yellow); color: #000; }

        #main { flex: 1; padding: 40px; overflow-y: auto; background: linear-gradient(135deg, #000 0%, #050505 100%); }
        .view { display: none; } .view.active { display: block; }

        h1 { font-family: 'Orbitron'; font-size: 28px; margin-bottom: 30px; }
        h1 span { color: var(--padel-yellow); }

        /* BARRE DE FILTRES STYLEE */
        .filter-bar { display: flex; gap: 15px; margin-bottom: 30px; background: #111; padding: 15px; border-radius: 12px; border: 1px solid var(--border); }
        .search-input { flex: 1; background: #000; border: 1px solid #333; padding: 12px; border-radius: 8px; color: white; border-left: 4px solid var(--padel-blue); }
        .select-club { background: #000; color: white; border: 1px solid #333; padding: 12px; border-radius: 8px; min-width: 200px; }

        /* MONITOR CARD DESIGN ORIGINAL */
        .monitor-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 25px; }
        .monitor-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 20px; padding: 20px; transition: 0.3s; position: relative; }
        .monitor-card.live { border-color: var(--padel-yellow); }
        .monitor-card.finished { border-color: #ff4444; }

        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
        .club-tag { font-size: 10px; background: #1a1a1a; padding: 4px 8px; border-radius: 4px; color: var(--padel-blue); font-weight: 900; }
        
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #333; display: inline-block; margin-right: 5px; }
        .live .status-dot { background: var(--padel-yellow); box-shadow: 0 0 10px var(--padel-yellow); animation: blink 1.5s infinite; }
        .finished .status-dot { background: #ff4444; }

        .score-row { display: flex; justify-content: space-between; align-items: center; background: #000; padding: 12px; border-radius: 10px; margin-bottom: 8px; }
        .player-names { font-size: 13px; font-weight: 900; color: #eee; text-transform: uppercase; }
        .score-val { font-family: 'Orbitron'; font-size: 20px; color: var(--padel-yellow); }
        .set-history { font-size: 11px; color: var(--padel-blue); margin-top: 4px; font-weight: bold; }

        /* BOUTONS ACTIONS */
        .btn-reset { background: #1a0000; color: #ff4444; border: 1px solid #300; width: 100%; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 11px; margin-top: 10px; }
        .btn-reset:hover { background: #300; }
        .primary-btn { background: var(--padel-yellow); color: #000; border: none; padding: 12px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* CONFIGURATION */
        .club-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 20px; padding: 25px; margin-bottom: 25px; }
        .court-row { display: flex; justify-content: space-between; align-items: center; background: #111; padding: 12px; border-radius: 10px; margin-bottom: 8px; border: 1px solid #222; }

        /* AUTH */
        #login-overlay { position: fixed; inset: 0; background: #000; z-index: 2000; display: flex; justify-content: center; align-items: center; }
        .login-box { background: #0a0a0a; padding: 50px; border-radius: 30px; border: 1px solid var(--padel-yellow); text-align: center; width: 350px; }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <div class="logo">ScoreTrak Admin</div>
            <input type="text" id="adm-u" placeholder="Identifiant" style="width:100%; background:#000; border:1px solid #333; color:white; padding:12px; border-radius:8px; margin-bottom:15px; box-sizing:border-box;">
            <input type="password" id="adm-p" placeholder="Mot de passe" style="width:100%; background:#000; border:1px solid #333; color:white; padding:12px; border-radius:8px; margin-bottom:20px; box-sizing:border-box;">
            <button onclick="login()" class="primary-btn" style="width:100%">DÉVERROUILLER</button>
        </div>
    </div>

    <div id="sidebar">
        <div class="logo">ScoreTrak</div>
        <div class="nav-item active" id="nav-dash" onclick="showView('dash')">📊 Surveillance Live</div>
        <div class="nav-item" id="nav-conf" onclick="showView('conf')">⚙️ Clubs & Terrains</div>
        <div style="margin-top:auto; font-size:10px; color:#333;">SUPER ADMIN CONSOLE V4.0</div>
    </div>

    <div id="main">
        <div id="view-dash" class="view active">
            <h1><span>Surveillance</span> Temps Réel</h1>
            
            <div class="filter-bar">
                <select id="filter-club" class="select-club" onchange="renderDashboard()">
                    <option value="all">TOUS LES CLUBS</option>
                </select>
                <input type="text" id="search-court" class="search-input" placeholder="Chercher un terrain..." onkeyup="renderDashboard()">
            </div>

            <div class="monitor-grid" id="monitor-list"></div>
        </div>

        <div id="view-conf" class="view">
            <h1><span>Gestion</span> Structure</h1>
            <div class="club-card" style="border-color: var(--padel-yellow);">
                <h3 style="margin-top:0">Ajouter un Club</h3>
                <div style="display:flex; gap:10px;">
                    <input type="text" id="new-club-name" placeholder="Nom du Club" style="flex:1; background:#000; border:1px solid #333; color:white; padding:12px; border-radius:8px;">
                    <button onclick="createClub()" class="primary-btn">CRÉER</button>
                </div>
            </div>
            <div id="club-mgmt-list"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, set, push, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const fbConfig = { apiKey: "AIzaSyCjlHL7GEXFvnrNzZAIEZyl-WCqUI3txiM", authDomain: "scoretrak-123.firebaseapp.com", databaseURL: "https://scoretrak-123-default-rtdb.europe-west1.firebasedatabase.app", projectId: "scoretrak-123" };
        const app = initializeApp(fbConfig); const db = getDatabase(app);

        let globalData = {};
        const TV_BASE_URL = "https://score-trak.vercel.app/PUB.html";

        window.login = () => {
            if(document.getElementById('adm-u').value === "master" && document.getElementById('adm-p').value === "score2026") {
                document.getElementById('login-overlay').style.display = 'none';
                sync();
            } else alert("Accès refusé");
        };

        window.showView = (v) => {
            document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
            document.getElementById('view-'+v).classList.add('active');
            document.getElementById('nav-'+v).classList.add('active');
        };

        function sync() {
            onValue(ref(db, 'clubs'), snap => {
                globalData = snap.val() || {};
                updateFilters();
                renderDashboard();
                renderManagement();
            });
        }

        function updateFilters() {
            const sel = document.getElementById('filter-club');
            const cur = sel.value;
            sel.innerHTML = '<option value="all">TOUS LES CLUBS</option>';
            Object.keys(globalData).forEach(id => {
                sel.innerHTML += `<option value="${id}">${globalData[id].name.toUpperCase()}</option>`;
            });
            sel.value = cur;
        }

        window.renderDashboard = () => {
            const list = document.getElementById('monitor-list');
            const clubFilter = document.getElementById('filter-club').value;
            const search = document.getElementById('search-court').value.toLowerCase();
            list.innerHTML = "";

            Object.keys(globalData).forEach(clubId => {
                if (clubFilter !== 'all' && clubFilter !== clubId) return;
                const club = globalData[clubId];
                if (!club.courts) return;

                Object.keys(club.courts).forEach(courtId => {
                    const c = club.courts[courtId];
                    if (search && !c.name.toLowerCase().includes(search)) return;

                    const isFini = c.winner != null;
                    const isLive = c.status === 'active' && !isFini;

                    let setsA = [], setsB = [];
                    for(let i=1; i<=3; i++) {
                        if(c['s'+i+'A'] !== undefined) {
                            setsA.push(c['s'+i+'A']); setsB.push(c['s'+i+'B']);
                        }
                    }

                    const card = document.createElement('div');
                    card.className = `monitor-card ${isLive?'live':''} ${isFini?'finished':''}`;
                    card.innerHTML = `
                        <div class="card-header">
                            <div>
                                <div class="club-tag">${club.name}</div>
                                <div style="font-weight:900; font-size:18px; margin-top:5px;">${c.name}</div>
                            </div>
                            <div style="font-size:11px; font-weight:bold;">
                                <span class="status-dot"></span>${isFini ? 'TERMINÉ' : (isLive ? 'EN COURS' : 'VEILLE')}
                            </div>
                        </div>

                        <div class="score-row">
                            <div>
                                <div class="player-names">${c.pA1} / ${c.pA2}</div>
                                <div class="set-history">${setsA.join(' | ') || '---'}</div>
                            </div>
                            <div class="score-val">${isFini ? c.setsA : (c.scoreA || 0)}</div>
                        </div>

                        <div class="score-row">
                            <div>
                                <div class="player-names">${c.pB1} / ${c.pB2}</div>
                                <div class="set-history">${setsB.join(' | ') || '---'}</div>
                            </div>
                            <div class="score-val">${isFini ? c.setsB : (c.scoreB || 0)}</div>
                        </div>

                        <button class="btn-reset" onclick="resetCourt('${clubId}','${courtId}')">RÉINITIALISER LE TERRAIN</button>
                    `;
                    list.appendChild(card);
                });
            });
        };

        function renderManagement() {
            const container = document.getElementById('club-mgmt-list');
            container.innerHTML = "";
            Object.keys(globalData).forEach(cid => {
                const club = globalData[cid];
                let courts = "";
                if(club.courts) {
                    Object.keys(club.courts).forEach(tid => {
                        const url = `${TV_BASE_URL}?clubId=${cid}&courtId=${tid}`;
                        courts += `
                            <div class="court-row">
                                <span style="font-weight:bold">${club.courts[tid].name}</span>
                                <div>
                                    <button class="primary-btn" style="padding:6px 12px; font-size:11px; background:var(--padel-blue)" onclick="copy('${url}')">🔗 LIEN TV</button>
                                    <button onclick="deleteCourt('${cid}','${tid}')" style="background:none; color:#f44; border:none; cursor:pointer; font-size:18px; margin-left:10px">×</button>
                                </div>
                            </div>`;
                    });
                }
                container.innerHTML += `
                    <div class="club-card">
                        <div style="display:flex; justify-content:space-between; margin-bottom:15px; border-bottom:1px solid #222; padding-bottom:10px">
                            <h2 style="margin:0; color:var(--padel-blue); font-family:Orbitron; font-size:20px;">${club.name}</h2>
                            <button onclick="deleteClub('${cid}')" style="background:none; border:none; color:#444; font-size:10px; cursor:pointer">SUPPRIMER</button>
                        </div>
                        ${courts}
                        <div style="display:flex; gap:10px; margin-top:15px">
                            <input type="text" id="in-${cid}" placeholder="Nouveau terrain..." style="flex:1; background:#000; border:1px solid #333; color:white; padding:10px; border-radius:8px;">
                            <button onclick="addCourt('${cid}')" class="primary-btn" style="padding:10px 20px">+</button>
                        </div>
                    </div>`;
            });
        }

        window.createClub = () => { const n = document.getElementById('new-club-name').value; if(n) { push(ref(db, 'clubs'), {name:n}); document.getElementById('new-club-name').value=""; } };
        window.addCourt = (cid) => {
            const n = document.getElementById('in-'+cid).value;
            if(n) push(ref(db, `clubs/${cid}/courts`), { 
                name:n, status:'idle', pA1:'Joueur 1', pA2:'Joueur 2', pB1:'Joueur 1', pB2:'Joueur 2', 
                scoreA:0, scoreB:0, gamesA:0, gamesB:0, setsA:0, setsB:0, serverTeam:'A' 
            });
        };
        window.resetCourt = (cid, tid) => { if(confirm("Forcer le reset ?")) update(ref(db, `clubs/${cid}/courts/${tid}`), {status:'idle', winner:null, scoreA:0, scoreB:0, gamesA:0, gamesB:0, setsA:0, setsB:0, s1A:null, s1B:null, s2A:null, s2B:null, s3A:null, s3B:null, tb1A:null, tb1B:null, tb2A:null, tb2B:null, tb3A:null, tb3B:null}); };
        window.deleteCourt = (cid, tid) => { if(confirm("Supprimer ce terrain ?")) remove(ref(db, `clubs/${cid}/courts/${tid}`)); };
        window.deleteClub = (cid) => { if(confirm("Supprimer club ?")) remove(ref(db, `clubs/${cid}`)); };
        window.copy = (t) => { navigator.clipboard.writeText(t); alert("URL Copiée !"); };

    </script>
</body>
</html>
