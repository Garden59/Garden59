<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>ScoreTrak TV - Padel Pro Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Roboto:wght@400;700;900&display=swap');

        :root {
            --padel-yellow: #ccff00;
            --padel-blue: #00d2ff;
            --carbon-bg: radial-gradient(circle at center, #1a1c23 0%, #0a0a0c 100%);
            --border-color: #222b38;
        }

        body {
            background: var(--carbon-bg);
            color: white;
            font-family: 'Roboto', sans-serif;
            margin: 0;
            height: 100vh;
            overflow: hidden;
        }
       
        /* 1. ÉCRAN VEILLE (IDLE) */
        #idle-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; z-index: 500; background: var(--carbon-bg);
        }
        .ad-space { flex: 1.8; border-right: 2px solid var(--border-color); display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .partner-box { font-size: 5vw; color: var(--padel-yellow); font-style: italic; border: 3px solid #333; padding: 50px; border-radius: 40px; text-align: center; font-weight: 900; }
        .qr-space { flex: 1.2; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #050608; }
        .qr-frame { background: white; padding: 20px; border-radius: 20px; }
        .qr-frame img { width: 20vw; height: 20vw; display: block; }
        .qr-text { margin-top: 30px; font-size: 1.6vw; color: var(--padel-yellow); text-align: center; text-transform: uppercase; letter-spacing: 2px; font-weight: bold; }

        /* 2. ÉCRAN SETUP */
        #setup-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 550;
        }
        .logo-setup { font-size: 12vw; color: var(--padel-yellow); font-family: 'Orbitron', sans-serif; font-style: italic; font-weight: 900; animation: pulse 1.5s infinite; }
        .setup-sub { font-size: 1.5vw; color: #555; text-transform: uppercase; letter-spacing: 12px; margin-top: 20px; font-weight: bold; }
       
        /* 3. ÉCRAN VICTOIRE & RÉSULTAT */
        #victory-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 600;
        }
        .victory-title {
            font-size: 12vw; color: var(--padel-yellow); font-family: 'Orbitron'; font-weight: 900;
            text-shadow: 0 0 50px rgba(204, 255, 0, 0.6);
            animation: smashIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            opacity: 0; transform: scale(3);
        }
        .victory-names { font-size: 5vw; color: white; margin-top: 20px; text-transform: uppercase; font-weight: 900; opacity: 0; animation: fadeIn 1s 1s forwards; }

        #final-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--carbon-bg); display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 580;
        }
        .final-header { font-size: 3vw; color: var(--padel-blue); text-transform: uppercase; font-weight: 900; margin-bottom: 2vh; letter-spacing: 5px; }
        .final-champions { font-size: 6vw; color: var(--padel-yellow); font-family: 'Orbitron'; font-weight: 900; text-align: center; margin-bottom: 5vh; text-shadow: 0 0 20px rgba(204,255,0,0.3); }
        .final-score-board { display: flex; gap: 3vw; background: rgba(0,0,0,0.5); padding: 3vh 5vw; border-radius: 20px; border: 1px solid var(--border-color); min-height: 15vh;}
        .final-set-col { display: flex; flex-direction: column; align-items: center; font-family: 'Orbitron'; font-size: 5vw; font-weight: 900; gap: 2vh; }
        .final-score-box { background: #111; padding: 10px 30px; border-radius: 10px; width: 80px; text-align: center; position: relative; min-height: 6vw;}

        /* 4. INTERFACE MATCH */
        .main-container { height: 100vh; display: flex; flex-direction: column; visibility: hidden; padding: 2vh 2vw; box-sizing: border-box; }
       
        .header-row {
            display: grid; grid-template-columns: 45% 10% 10% 10% 25%; padding: 1.5vh 0;
            color: #6a7b92; font-weight: 900; font-size: 1.2vw; text-transform: uppercase;
            text-align: center; border-bottom: 2px solid var(--border-color);
        }

        .team-row { display: grid; grid-template-columns: 45% 10% 10% 10% 25%; height: 40vh; border-bottom: 1px solid var(--border-color); }
        .team-identity { display: flex; flex-direction: column; justify-content: center; padding-left: 2vw; position: relative; }
        .player-line { display: flex; align-items: center; height: 6vw; }
        .name-txt { font-size: 4.5vw; font-weight: 900; text-transform: uppercase; color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }

        .serve-ball {
            width: 1.8vw; height: 1.8vw; background: var(--padel-yellow);
            border-radius: 50%; margin-left: 20px; box-shadow: 0 0 20px var(--padel-yellow);
            display: none;
        }

        .set-cell {
            display: flex; align-items: center; justify-content: center;
            font-family: 'Orbitron'; font-size: 6.5vw; font-weight: 900; color: #fff;
            border-right: 1px solid var(--border-color); background: rgba(0, 210, 255, 0.02);
            position: relative;
        }

        .tb-score { font-size: 2.5vw; position: absolute; top: 15%; right: 15%; color: #888; font-weight: 700; }
        .set-winner { color: var(--padel-yellow); text-shadow: 0 0 15px rgba(204, 255, 0, 0.4); }

        .pts-cell {
            display: flex; align-items: center; justify-content: center;
            font-family: 'Orbitron'; font-size: 15vw; font-weight: 900;
            color: var(--padel-blue); background: rgba(0, 210, 255, 0.05);
            text-shadow: 0 0 30px rgba(0, 210, 255, 0.3);
        }

        .footer-match {
            display: flex; justify-content: space-between; align-items: center;
            padding: 2vh 2vw; color: #5a6b82; font-size: 1vw; font-weight: 900; text-transform: uppercase;
        }

        #status-badge { color: var(--padel-yellow); letter-spacing: 5px; animation: blink 1s infinite; display: none; background: rgba(204,255,0,0.1); padding: 5px 20px; border-radius: 10px; border: 1px solid var(--padel-yellow); }

        @keyframes smashIn { 100% { opacity: 1; transform: scale(1); } }
        @keyframes fadeIn { 100% { opacity: 1; } }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); opacity: 0.8; } }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="idle-screen">
        <div class="ad-space"><div class="partner-box">PARTENAIRE<br>DU CLUB</div></div>
        <div class="qr-space">
            <div class="qr-frame"><img id="qr-code-img" src="" alt="QR"></div>
            <div class="qr-text">Scanner pour<br>gérer le score</div>
        </div>
    </div>

    <div id="setup-screen">
        <div class="logo-setup">ScoreTrak</div>
        <div class="setup-sub">Configuration...</div>
    </div>

    <div id="victory-screen">
        <div class="victory-title">VICTOIRE</div>
        <div id="win-names-tv" class="victory-names"></div>
    </div>

    <div id="final-screen">
        <div class="final-header">Résultat du Match</div>
        <div id="final-champs" class="final-champions"></div>
        <div class="final-score-board">
            <div class="final-set-col">
                <div id="fs-A1" class="final-score-box"></div>
                <div id="fs-B1" class="final-score-box"></div>
            </div>
            <div class="final-set-col">
                <div id="fs-A2" class="final-score-box"></div>
                <div id="fs-B2" class="final-score-box"></div>
            </div>
            <div class="final-set-col">
                <div id="fs-A3" class="final-score-box"></div>
                <div id="fs-B3" class="final-score-box"></div>
            </div>
        </div>
    </div>

    <div id="main-ui" class="main-container">
        <div class="header-row">
            <div>Joueurs</div>
            <div>S1</div>
            <div>S2</div>
            <div>S3</div>
            <div>Points</div>
        </div>

        <div class="team-row">
            <div class="team-identity">
                <div class="player-line"><span id="nA1" class="name-txt"></span><div id="bA1" class="serve-ball"></div></div>
                <div class="player-line"><span id="nA2" class="name-txt"></span><div id="bA2" class="serve-ball"></div></div>
            </div>
            <div id="st1A" class="set-cell"></div>
            <div id="st2A" class="set-cell"></div>
            <div id="st3A" class="set-cell"></div>
            <div id="sA" class="pts-cell">0</div>
        </div>

        <div class="team-row" style="border:none;">
            <div class="team-identity">
                <div class="player-line"><span id="nB1" class="name-txt"></span><div id="bB1" class="serve-ball"></div></div>
                <div class="player-line"><span id="nB2" class="name-txt"></span><div id="bB2" class="serve-ball"></div></div>
            </div>
            <div id="st1B" class="set-cell"></div>
            <div id="st2B" class="set-cell"></div>
            <div id="st3B" class="set-cell"></div>
            <div id="sB" class="pts-cell">0</div>
        </div>

        <div class="footer-match">
            <div>Court N°1 - Live ScoreTrak</div>
            <div id="status-badge">BALLE DE MATCH</div>
            <div></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCjlHL7GEXFvnrNzZAIEZyl-WCqUI3txiM",
            authDomain: "scoretrak-123.firebaseapp.com",
            databaseURL: "https://scoretrak-123-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "scoretrak-123"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const urlSmartphone = "https://dashing-youtiao-01e5cd.netlify.app/smartphonev4";
        document.getElementById('qr-code-img').src = `https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=${encodeURIComponent(urlSmartphone)}&color=000000`;

        const labels = ["0", "15", "30", "40", "AD"];
        let victoryTimer = null;
        let isFinalScreenShown = false;

        // Fonction pour formater un score avec JAUNE si c'est le gagnant
        function formatScoreHTML(val, isWinner, tbVal) {
            if (val === undefined || val === null || val === "" || val === "-") return "";
            let html = `<span class="${isWinner ? 'set-winner' : ''}">${val}</span>`;
            if (tbVal !== undefined && tbVal !== null && tbVal !== "" && !isWinner) {
                html += `<span class="tb-score">${tbVal}</span>`;
            }
            return html;
        }

        onValue(ref(db, 'match/terrain1'), (snap) => {
            const d = snap.val();
            const idle = document.getElementById('idle-screen');
            const setup = document.getElementById('setup-screen');
            const main = document.getElementById('main-ui');
            const victory = document.getElementById('victory-screen');
            const finalScreen = document.getElementById('final-screen');
            const badge = document.getElementById('status-badge');

            if (!d || d.status === 'idle') {
                idle.style.display = 'flex'; setup.style.display = 'none'; main.style.visibility = 'hidden'; victory.style.display = 'none'; finalScreen.style.display = 'none'; isFinalScreenShown = false; clearTimeout(victoryTimer); return;
            }
            if (d.status === 'setup') {
                idle.style.display = 'none'; setup.style.display = 'flex'; main.style.visibility = 'hidden'; victory.style.display = 'none'; finalScreen.style.display = 'none'; isFinalScreenShown = false; clearTimeout(victoryTimer); return;
            }

            idle.style.display = 'none'; setup.style.display = 'none';
           
            const totalSets = (d.setsA || 0) + (d.setsB || 0);
            const currentSetIdx = totalSets + 1;

            // --- GESTION VICTOIRE ET RÉSULTAT FINAL ---
            if (d.winner) {
                const winText = d.winner === 'A' ? `${d.pA1} & ${d.pA2}` : `${d.pB1} & ${d.pB2}`;
                if (!isFinalScreenShown && victory.style.display !== 'flex') {
                    main.style.visibility = 'hidden';
                    victory.style.display = 'flex';
                    document.getElementById('win-names-tv').innerText = winText;
                   
                    victoryTimer = setTimeout(() => {
                        victory.style.display = 'none';
                        finalScreen.style.display = 'flex';
                        isFinalScreenShown = true;
                        document.getElementById('final-champs').innerText = winText;
                       
                        // Remplissage tableau final
                        for(let i=1; i<=3; i++) {
                            let sA = d['s'+i+'A'] || (i === currentSetIdx ? d.gamesA : "");
                            let sB = d['s'+i+'B'] || (i === currentSetIdx ? d.gamesB : "");
                            let aWins = (sA !== "" && sB !== "" && parseInt(sA) > parseInt(sB));
                            let bWins = (sA !== "" && sB !== "" && parseInt(sB) > parseInt(sA));
                            document.getElementById(`fs-A${i}`).innerHTML = formatScoreHTML(sA, aWins, d[`tb${i}A`]);
                            document.getElementById(`fs-B${i}`).innerHTML = formatScoreHTML(sB, bWins, d[`tb${i}B`]);
                        }
                    }, 5000);
                }
                return;
            } else {
                victory.style.display = 'none';
                finalScreen.style.display = 'none';
                main.style.visibility = 'visible';
                isFinalScreenShown = false;
                clearTimeout(victoryTimer);
            }

            // --- MISE À JOUR NOMS ---
            document.getElementById('nA1').innerText = d.pA1 || "";
            document.getElementById('nA2').innerText = d.pA2 || "";
            document.getElementById('nB1').innerText = d.pB1 || "";
            document.getElementById('nB2').innerText = d.pB2 || "";

            // --- MISE À JOUR POINTS (Jeu actuel) ---
            const isTB = (d.gamesA === 6 && d.gamesB === 6);
            document.getElementById('sA').innerText = isTB ? d.scoreA : (labels[d.scoreA] || "0");
            document.getElementById('sB').innerText = isTB ? d.scoreB : (labels[d.scoreB] || "0");
           
            // --- LOGIQUE CALCUL TABLEAU (S1, S2, S3) ---
            for(let i=1; i<=3; i++) {
                let valA = "", valB = "";
                let isWinnerA = false, isWinnerB = false;

                if (i < currentSetIdx) {
                    // Set archivé : on lit s1A, s1B...
                    valA = d['s'+i+'A'];
                    valB = d['s'+i+'B'];
                    if (valA !== undefined && valB !== undefined) {
                        if (parseInt(valA) > parseInt(valB)) isWinnerA = true;
                        else if (parseInt(valB) > parseInt(valA)) isWinnerB = true;
                    }
                } else if (i === currentSetIdx) {
                    // Set en cours : on lit les games actuels
                    valA = d.gamesA;
                    valB = d.gamesB;
                    // Personne n'est "gagnant" tant que le set n'est pas fini
                }

                document.getElementById(`st${i}A`).innerHTML = formatScoreHTML(valA, isWinnerA, d['tb'+i+'A']);
                document.getElementById(`st${i}B`).innerHTML = formatScoreHTML(valB, isWinnerB, d['tb'+i+'B']);
            }

            // --- LOGIQUE BADGES (Balle de Jeu / Set / Match) ---
            badge.style.display = "none";
            const sA = d.scoreA || 0; const sB = d.scoreB || 0;
            const gA = d.gamesA || 0; const gB = d.gamesB || 0;

            let potentialGameA = (!isTB && ((sA === 3 && sB < 3) || sA === 4)) || (isTB && sA >= 6 && sA > sB);
            let potentialGameB = (!isTB && ((sB === 3 && sA < 3) || sB === 4)) || (isTB && sB >= 6 && sB > sA);

            let willWinSetA = (isTB) || (gA === 5 && gB <= 4) || (gA === 6 && gB === 5);
            let willWinSetB = (isTB) || (gB === 5 && gA <= 4) || (gB === 6 && gA === 5);

            if (potentialGameA) {
                if (d.setsA === 1 && willWinSetA) badge.innerText = "BALLE DE MATCH";
                else if (willWinSetA) badge.innerText = "BALLE DE SET";
                else if (d.serverTeam === 'B') badge.innerText = "BALLE DE BREAK";
                else badge.innerText = "BALLE DE JEU";
                badge.style.display = "block";
            } else if (potentialGameB) {
                if (d.setsB === 1 && willWinSetB) badge.innerText = "BALLE DE MATCH";
                else if (willWinSetB) badge.innerText = "BALLE DE SET";
                else if (d.serverTeam === 'A') badge.innerText = "BALLE DE BREAK";
                else badge.innerText = "BALLE DE JEU";
                badge.style.display = "block";
            }

            // --- SERVICE ---
            ['bA1', 'bA2', 'bB1', 'bB2'].forEach(id => document.getElementById(id).style.display = 'none');
            const currentBall = 'b' + d.serverTeam + d.serverNum;
            if(document.getElementById(currentBall)) document.getElementById(currentBall).style.display = 'block';
        });
    </script>
</body>
</html>
