<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScoreTrak TV - Ultimate Dynamic V5</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Roboto:wght@900&display=swap');

        body { 
            background: #000; color: white; font-family: 'Roboto', sans-serif; 
            margin: 0; height: 100vh; width: 100vw; overflow: hidden; 
            display: flex; flex-direction: column;
        }

        /* --- ÉCRANS ÉTATS --- */
        #idle-screen { position: fixed; inset: 0; display: flex; z-index: 500; background: #000; }
        .ad-space { flex: 1.8; border-right: 2px solid #1a1a1a; display: flex; justify-content: center; align-items: center; background: radial-gradient(circle, #111, #000); }
        .qr-space { flex: 1.2; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #050505; }
        .qr-frame { background: white; padding: 20px; border-radius: 20px; }
        .qr-frame img { width: 22vw; height: 22vw; }
        .qr-text { margin-top: 30px; font-size: 1.8vw; color: #ccff00; text-align: center; text-transform: uppercase; font-family: 'Orbitron'; }

        #setup-screen { position: fixed; inset: 0; background: #000; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 550; }
        .logo-setup { font-size: 10vw; color: #ccff00; font-style: italic; font-weight: 900; animation: pulse 1.5s infinite; }

        #victory-screen { position: fixed; inset: 0; background: #000; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 600; text-align: center; }
        .victoire-title { font-size: 10vw; color: #ccff00; font-family: 'Orbitron'; text-shadow: 0 0 50px rgba(204,255,0,0.5); }

        /* --- SCOREBOARD --- */
        #main-ui { flex: 1; display: flex; flex-direction: column; visibility: hidden; }
        table { width: 100%; height: 100%; border-collapse: collapse; table-layout: fixed; }
        thead th { background: #111; color: #555; font-size: 1.5vw; padding: 1.5vh; text-transform: uppercase; border-bottom: 2px solid #222; }
        
        td { text-align: center; border-bottom: 1px solid #111; }
        .team-box { display: flex; flex-direction: column; justify-content: center; padding-left: 3vw; text-align: left; }
        .player-row { display: flex; align-items: center; height: 4.5vw; }
        .name { font-size: 4vw; font-weight: 900; text-transform: uppercase; line-height: 1; }
        .serve-ball { width: 2vw; height: 2vw; background: #ccff00; border-radius: 50%; margin-left: 1.5vw; box-shadow: 0 0 20px #ccff00; display: none; }

        .val-sets { font-family: 'Orbitron'; font-size: 6vw; color: #FF5722; }
        .val-games { font-family: 'Orbitron'; font-size: 9vw; color: #FFD700; }
        .val-points { font-family: 'Orbitron'; font-size: 15vw; font-weight: 900; }

        .row-green { border-left: 2.5vw solid #4CAF50; }
        .row-green .name, .row-green .val-points { color: #4CAF50; }
        .row-blue { border-left: 2.5vw solid #2196F3; }
        .row-blue .name, .row-blue .val-points { color: #2196F3; }

        /* --- BARRE D'AFFICHAGE DYNAMIQUE --- */
        .status-bar { height: 12vh; background: #000; display: flex; justify-content: center; align-items: center; border-top: 2px solid #222; }
        .gold-badge { 
            color: #FFD600; font-size: 3.5vw; font-weight: 900; 
            text-transform: uppercase; letter-spacing: 8px; 
            text-shadow: 0 0 20px rgba(255, 214, 0, 0.6); 
            animation: blink-gold 1s infinite; display: none; 
        }

        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        @keyframes blink-gold { 0% { opacity: 1; } 50% { opacity: 0.2; } 100% { opacity: 1; } }
        .confetti { position: absolute; width: 15px; height: 15px; animation: fall 4s linear infinite; z-index: 700; }
        @keyframes fall { 0% { transform: translateY(-10vh) rotate(0deg); } 100% { transform: translateY(110vh) rotate(720deg); } }
    </style>
</head>
<body>

    <div id="idle-screen">
        <div class="ad-space"><div style="font-size: 5vw; color: #ccff00; font-style: italic; border: 3px solid #222; padding: 50px; border-radius: 40px; font-weight: 900;">VOTRE PUB ICI</div></div>
        <div class="qr-space">
            <div class="qr-frame"><img id="qr-code-img" src="" alt="QR Code"></div>
            <div class="qr-text">Scanner pour<br>gérer le match</div>
        </div>
    </div>

    <div id="setup-screen"><div class="logo-setup">ScoreTrak</div><div style="color:white; letter-spacing:5px; margin-top:20px; font-family:'Orbitron';">CONFIGURATION EN COURS...</div></div>

    <div id="victory-screen"><div class="victoire-title">VICTOIRE</div><div id="win-names-tv" style="font-size: 5vw; margin-top: 20px; font-weight: 900;"></div></div>

    <div id="main-ui">
        <table>
            <thead><tr><th style="width:40%">Équipes</th><th style="width:10%">Sets</th><th style="width:15%">Jeux</th><th style="width:25%">Points</th></tr></thead>
            <tbody>
                <tr class="row-green">
                    <td><div class="team-box">
                        <div class="player-row"><span id="nA1" class="name"></span><div id="bA1" class="serve-ball"></div></div>
                        <div class="player-row"><span id="nA2" class="name"></span><div id="bA2" class="serve-ball"></div></div>
                    </div></td>
                    <td><span id="stA" class="val-sets">0</span></td>
                    <td><span id="gA" class="val-games">0</span></td>
                    <td style="background:#050505"><span id="sA" class="val-points">0</span></td>
                </tr>
                <tr class="row-blue">
                    <td><div class="team-box">
                        <div class="player-row"><span id="nB1" class="name"></span><div id="bB1" class="serve-ball"></div></div>
                        <div class="player-row"><span id="nB2" class="name"></span><div id="bB2" class="serve-ball"></div></div>
                    </div></td>
                    <td><span id="stB" class="val-sets">0</span></td>
                    <td><span id="gB" class="val-games">0</span></td>
                    <td style="background:#050505"><span id="sB" class="val-points">0</span></td>
                </tr>
            </tbody>
        </table>
        <div class="status-bar"><div id="status-badge" class="gold-badge"></div></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyCjlHL7GEXFvnrNzZAIEZyl-WCqUI3txiM", 
            authDomain: "scoretrak-123.firebaseapp.com", 
            databaseURL: "https://scoretrak-123-default-rtdb.europe-west1.firebasedatabase.app", 
            projectId: "scoretrak-123" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const urlSmartphone = "https://hilarious-hummingbird-1e8113.netlify.app/smartphonev5";
        document.getElementById('qr-code-img').src = `https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=${encodeURIComponent(urlSmartphone)}`;

        function setAlert(text) {
            const badge = document.getElementById('status-badge');
            if (!text) { badge.style.display = "none"; } 
            else { badge.innerText = text; badge.style.display = "block"; }
        }

        onValue(ref(db, 'match/terrain1'), (snap) => {
            const d = snap.val();
            const labels = ["0", "15", "30", "40", "AD"];
            
            if (!d || d.status === 'idle' || !d.active) {
                document.getElementById('idle-screen').style.display = 'flex';
                document.getElementById('setup-screen').style.display = 'none';
                document.getElementById('main-ui').style.visibility = 'hidden';
                return;
            }
            if (d.status === 'setup') {
                document.getElementById('idle-screen').style.display = 'none';
                document.getElementById('setup-screen').style.display = 'flex';
                document.getElementById('main-ui').style.visibility = 'hidden';
                return;
            }

            document.getElementById('idle-screen').style.display = 'none';
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('main-ui').style.visibility = 'visible';

            // Données
            document.getElementById('nA1').innerText = d.pA1; document.getElementById('nA2').innerText = d.pA2;
            document.getElementById('nB1').innerText = d.pB1; document.getElementById('nB2').innerText = d.pB2;
            
            const isTB = (d.gamesA === 6 && d.gamesB === 6);
            document.getElementById('sA').innerText = isTB ? d.scoreA : (labels[d.scoreA] || "0");
            document.getElementById('sB').innerText = isTB ? d.scoreB : (labels[d.scoreB] || "0");
            document.getElementById('gA').innerText = d.gamesA; document.getElementById('gB').innerText = d.gamesB;
            document.getElementById('stA').innerText = d.setsA; document.getElementById('stB').innerText = d.setsB;

            // Service
            ['bA1', 'bA2', 'bB1', 'bB2'].forEach(id => document.getElementById(id).style.display = 'none');
            const current = 'b' + d.serverTeam + d.serverNum;
            if(document.getElementById(current)) document.getElementById(current).style.display = 'block';

            // AFFICHAGE DYNAMIQUE DES ALERTES
            let alertMsg = "";
            const sA = d.scoreA; const sB = d.scoreB;
            const isMatchPoint = (d.setsA === 1 && sA >= 3 && sA > sB) || (d.setsB === 1 && sB >= 3 && sB > sA);
            const isSetPoint = (d.gamesA >= 5 && sA >= 3 && sA > sB) || (d.gamesB >= 5 && sB >= 3 && sB > sA);
            
            if (isMatchPoint) alertMsg = "BALLE DE MATCH";
            else if (isSetPoint) alertMsg = "BALLE DE SET";
            else if ((sA >= 3 && sA > sB) || (sB >= 3 && sB > sA)) alertMsg = "BALLE DE JEU";
            
            setAlert(alertMsg);

            // Victoire
            if (d.winner) {
                document.getElementById('victory-screen').style.display = 'flex';
                document.getElementById('win-names-tv').innerText = d.winner === 'A' ? `${d.pA1} & ${d.pA2}` : `${d.pB1} & ${d.pB2}`;
            } else {
                document.getElementById('victory-screen').style.display = 'none';
            }
        });
    </script>
</body>
</html>
