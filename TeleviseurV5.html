<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScoreTrak TV - Ultimate V5 Final</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Roboto:wght@900&display=swap');

        body { 
            background: #000; 
            color: white; 
            font-family: 'Roboto', sans-serif; 
            margin: 0; 
            height: 100vh; 
            width: 100vw; 
            overflow: hidden; 
            display: flex;
            flex-direction: column;
        }

        /* --- ÉCRAN VEILLE (IDLE) --- */
        #idle-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; z-index: 500; background: #000; }
        .ad-space { flex: 1.8; border-right: 2px solid #1a1a1a; display: flex; flex-direction: column; justify-content: center; align-items: center; background: radial-gradient(circle at center, #111 0%, #000 100%); }
        .qr-space { flex: 1.2; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #050505; }
        .qr-frame { background: white; padding: 20px; border-radius: 20px; }
        .qr-frame img { width: 22vw; height: 22vw; display: block; }
        .qr-text { margin-top: 30px; font-size: 1.8vw; color: #ccff00; text-align: center; text-transform: uppercase; font-family: 'Orbitron'; }

        /* --- ÉCRAN SETUP (Avec ton animation ScoreTrak qui bouge) --- */
        #setup-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 550; }
        .logo-setup { font-size: 10vw; color: #ccff00; font-style: italic; font-weight: 900; animation: pulse 1.5s infinite; }
        .setup-text { color: white; letter-spacing: 5px; margin-top: 20px; font-family: 'Orbitron'; font-size: 1.5vw; }

        /* --- ÉCRAN VICTOIRE --- */
        #victory-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 600; text-align: center; }
        .victoire-title { font-size: 10vw; color: #ccff00; text-shadow: 0 0 50px rgba(204, 255, 0, 0.5); font-family: 'Orbitron'; }
        .victoire-names { font-size: 5vw; color: white; margin-top: 20px; font-weight: 900; }

        /* --- SCOREBOARD PRINCIPAL (Design Tableau V5) --- */
        #main-ui { flex: 1; display: flex; flex-direction: column; width: 100%; visibility: hidden; }
        table { width: 100%; height: 100%; border-collapse: collapse; table-layout: fixed; }
        thead th { background: #111; color: #555; font-size: 1.5vw; padding: 1.5vh; text-transform: uppercase; border-bottom: 2px solid #222; }
        
        .col-names { width: 40%; }
        .col-sets { width: 10%; }
        .col-games { width: 15%; }
        .col-points { width: 25%; background-color: #050505; }

        td { text-align: center; border-bottom: 1px solid #111; }
        .team-box { display: flex; flex-direction: column; justify-content: center; padding-left: 3vw; text-align: left; }
        .player-row { display: flex; align-items: center; height: 4.5vw; }
        .name { font-size: 4vw; font-weight: 900; text-transform: uppercase; line-height: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Balle de service */
        .serve-ball { width: 2vw; height: 2vw; background: #ccff00; border-radius: 50%; margin-left: 1.5vw; box-shadow: 0 0 20px #ccff00; display: none; }

        /* Styles des valeurs numériques */
        .val-sets { font-family: 'Orbitron'; font-size: 6vw; color: #FF5722; }
        .val-games { font-family: 'Orbitron'; font-size: 9vw; color: #FFD700; }
        .val-points { font-family: 'Orbitron'; font-size: 15vw; font-weight: 900; }

        .row-green { border-left: 2.5vw solid #4CAF50; }
        .row-green .name, .row-green .val-points { color: #4CAF50; }
        .row-blue { border-left: 2.5vw solid #2196F3; }
        .row-blue .name, .row-blue .val-points { color: #2196F3; }

        .status-bar { height: 10vh; background: #000; display: flex; justify-content: center; align-items: center; border-top: 2px solid #222; }
        .gold-badge { color: #FFD600; font-size: 3vw; font-weight: 900; text-transform: uppercase; letter-spacing: 8px; animation: blink-gold 1s infinite; display: none; }

        /* Animations */
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        @keyframes blink-gold { 0% { opacity: 1; } 50% { opacity: 0.2; } 100% { opacity: 1; } }
        .confetti { position: absolute; width: 15px; height: 15px; animation: fall 4s linear infinite; z-index: 700; }
        @keyframes fall { 0% { transform: translateY(-10vh) rotate(0deg); } 100% { transform: translateY(110vh) rotate(720deg); } }
    </style>
</head>
<body>

    <div id="idle-screen">
        <div class="ad-space">
            <div style="font-size: 5vw; color: #ccff00; font-style: italic; border: 3px solid #222; padding: 50px; border-radius: 40px; text-align: center; font-weight: 900;">VOTRE PUB ICI</div>
        </div>
        <div class="qr-space">
            <div class="qr-frame"><img id="qr-code-img" src="" alt="QR Code"></div>
            <div class="qr-text">Scanner pour<br>gérer le match</div>
        </div>
    </div>

    <div id="setup-screen">
        <div class="logo-setup">ScoreTrak</div>
        <div class="setup-text">CONFIGURATION EN COURS...</div>
    </div>

    <div id="victory-screen">
        <div class="victoire-title">VICTOIRE</div>
        <div id="win-names-tv" class="victoire-names"></div>
    </div>

    <div id="main-ui">
        <table>
            <thead>
                <tr>
                    <th class="col-names">Équipes</th>
                    <th class="col-sets">Sets</th>
                    <th class="col-games">Jeux</th>
                    <th class="col-points">Points</th>
                </tr>
            </thead>
            <tbody>
                <tr class="row-green">
                    <td class="col-names">
                        <div class="team-box">
                            <div class="player-row"><span id="nA1" class="name"></span><div id="bA1" class="serve-ball"></div></div>
                            <div class="player-row"><span id="nA2" class="name"></span><div id="bA2" class="serve-ball"></div></div>
                        </div>
                    </td>
                    <td><span id="stA" class="val-sets">0</span></td>
                    <td><span id="gA" class="val-games">0</span></td>
                    <td class="col-points"><span id="sA" class="val-points">0</span></td>
                </tr>
                <tr class="row-blue">
                    <td class="col-names">
                        <div class="team-box">
                            <div class="player-row"><span id="nB1" class="name"></span><div id="bB1" class="serve-ball"></div></div>
                            <div class="player-row"><span id="nB2" class="name"></span><div id="bB2" class="serve-ball"></div></div>
                        </div>
                    </td>
                    <td><span id="stB" class="val-sets">0</span></td>
                    <td><span id="gB" class="val-games">0</span></td>
                    <td class="col-points"><span id="sB" class="val-points">0</span></td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="status-bar">
        <div id="status-badge" class="gold-badge">BALLE DE MATCH</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyCjlHL7GEXFvnrNzZAIEZyl-WCqUI3txiM", 
            authDomain: "scoretrak-123.firebaseapp.com", 
            databaseURL: "https://scoretrak-123-default-rtdb.europe-west1.firebasedatabase.app", 
            projectId: "scoretrak-123" 
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // QR CODE SETUP (Smartphone V5)
        const urlSmartphone = "https://hilarious-hummingbird-1e8113.netlify.app/smartphonev5";
        document.getElementById('qr-code-img').src = `https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=${encodeURIComponent(urlSmartphone)}`;

        const labels = ["0", "15", "30", "40", "AD"];

        onValue(ref(db, 'match/terrain1'), (snap) => {
            const d = snap.val();
            const idle = document.getElementById('idle-screen');
            const setup = document.getElementById('setup-screen');
            const main = document.getElementById('main-ui');
            const victory = document.getElementById('victory-screen');
            const badge = document.getElementById('status-badge');

            // 1. GESTION DES ÉTATS (Veille / Setup / Match)
            if (!d || d.status === 'idle' || !d.active) {
                idle.style.display = 'flex';
                setup.style.display = 'none';
                main.style.visibility = 'hidden';
                victory.style.display = 'none';
                stopConfetti();
                return;
            }

            if (d.status === 'setup') {
                idle.style.display = 'none';
                setup.style.display = 'flex';
                main.style.visibility = 'hidden';
                victory.style.display = 'none';
                return;
            }

            // Mode Match Actif
            idle.style.display = 'none';
            setup.style.display = 'none';
            main.style.visibility = 'visible';

            // 2. VICTOIRE
            if (d.winner) {
                victory.style.display = 'flex';
                document.getElementById('win-names-tv').innerText = d.winner === 'A' ? `${d.pA1} & ${d.pA2}` : `${d.pB1} & ${d.pB2}`;
                startConfetti();
            } else {
                victory.style.display = 'none';
                stopConfetti();
            }

            // 3. MISE À JOUR DES DONNÉES (Logique V4)
            document.getElementById('nA1').innerText = d.pA1; 
            document.getElementById('nA2').innerText = d.pA2;
            document.getElementById('nB1').innerText = d.pB1; 
            document.getElementById('nB2').innerText = d.pB2;
            
            const isTB = (d.gamesA === 6 && d.gamesB === 6);
            document.getElementById('sA').innerText = isTB ? d.scoreA : (labels[d.scoreA] || "0");
            document.getElementById('sB').innerText = isTB ? d.scoreB : (labels[d.scoreB] || "0");
            
            document.getElementById('gA').innerText = d.gamesA; 
            document.getElementById('gB').innerText = d.gamesB;
            document.getElementById('stA').innerText = d.setsA; 
            document.getElementById('stB').innerText = d.setsB;

            // 4. SERVICE (Balles V4)
            ['bA1', 'bA2', 'bB1', 'bB2'].forEach(id => document.getElementById(id).style.display = 'none');
            const current = 'b' + d.serverTeam + d.serverNum;
            if(document.getElementById(current)) document.getElementById(current).style.display = 'block';

            // 5. BADGE DE STATUS (Optionnel)
            if (d.scoreA === 4 || d.scoreB === 4) {
                badge.innerText = "BALLE DE JEU";
                badge.style.display = "block";
            } else {
                badge.style.display = "none";
            }
        });

        function startConfetti() {
            if (document.querySelectorAll('.confetti').length > 0) return;
            for(let i=0; i<100; i++) {
                let c = document.createElement('div');
                c.className = 'confetti';
                c.style.left = Math.random()*100+'vw';
                c.style.backgroundColor = ['#ccff00','#fff','#4CAF50','#2196F3','#FFD700'][Math.floor(Math.random()*5)];
                c.style.animationDuration = (Math.random()*3 + 2)+'s';
                document.getElementById('victory-screen').appendChild(c);
            }
        }

        function stopConfetti() {
            const confettis = document.querySelectorAll('.confetti');
            confettis.forEach(c => c.remove());
        }
    </script>
</body>
</html>
