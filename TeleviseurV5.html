<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>ScoreTrak TV - v4</title>
    <style>
        body { background: #000; color: white; font-family: 'Arial Black', sans-serif; margin: 0; height: 100vh; overflow: hidden; }
        
        /* 1. ÉCRAN VEILLE (IDLE) */
        #idle-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; z-index: 500; }
        .ad-space { flex: 1.8; border-right: 2px solid #1a1a1a; display: flex; flex-direction: column; justify-content: center; align-items: center; background: radial-gradient(circle at center, #111 0%, #000 100%); }
        .qr-space { flex: 1.2; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #050505; }
        .qr-frame { background: white; padding: 20px; border-radius: 20px; }
        .qr-frame img { width: 22vw; height: 22vw; display: block; }
        .qr-text { margin-top: 30px; font-size: 1.8vw; color: #ccff00; text-align: center; text-transform: uppercase; line-height: 1.2; }

        /* 2. ÉCRAN SETUP (DÈS QU'ON CLIQUE SUR LE TEL) */
        #setup-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 550; }
        .logo-setup { font-size: 10vw; color: #ccff00; font-style: italic; animation: pulse 1.5s infinite; }
        
        /* 3. ÉCRAN VICTOIRE */
        #victory-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 600; }

        /* 4. INTERFACE MATCH */
        .main-container { height: 100vh; display: flex; flex-direction: column; justify-content: center; visibility: hidden; }
        .row { display: flex; align-items: center; justify-content: space-between; padding: 2vh 4vw; border-bottom: 2px solid #111; height: 45vh; }
        .name { font-size: 5.5vw; font-weight: bold; text-transform: uppercase; }
        .serve-ball { width: 2.5vw; height: 2.5vw; background: #ccff00; border-radius: 50%; margin-left: 20px; box-shadow: 0 0 20px #ccff00; display: none; }
        .pts { font-size: 24vw; font-weight: 900; min-width: 25vw; text-align: center; }
        .games { font-size: 11vw; color: #FFD700; background: #1a1a1a; padding: 10px 25px; border-radius: 15px; margin: 0 30px; }
        .sets { font-size: 8vw; color: #FF5722; }

        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.05); opacity: 0.7; } }
    </style>
</head>
<body>

    <div id="idle-screen">
        <div class="ad-space">
            <div style="font-size: 5vw; color: #ccff00; font-style: italic; border: 3px solid #222; padding: 50px; border-radius: 40px; text-align: center;">PARTENAIRE<br>DU CLUB</div>
        </div>
        <div class="qr-space">
            <div class="qr-frame"><img id="qr-code-img" src="" alt="QR"></div>
            <div class="qr-text">Scanner pour<br>gérer le score</div>
        </div>
    </div>

    <div id="setup-screen">
        <div class="logo-setup">ScoreTrak</div>
        <div style="font-size: 2vw; color: white; text-transform: uppercase; letter-spacing: 10px; margin-top: 20px;">Configuration en cours...</div>
    </div>

    <div id="victory-screen">
        <div style="font-size: 10vw; color: #ccff00;">VICTOIRE</div>
        <div id="win-names-tv" style="font-size: 5vw; color: white; margin-top: 20px;"></div>
    </div>

    <div id="main-ui" class="main-container">
        <div class="row" style="color: #4CAF50;">
            <div style="flex:4;">
                <div style="display:flex; align-items:center;"><span id="nA1" class="name"></span><div id="bA1" class="serve-ball"></div></div>
                <div style="display:flex; align-items:center; margin-top:15px;"><span id="nA2" class="name"></span><div id="bA2" class="serve-ball"></div></div>
            </div>
            <div style="display:flex; flex:6; justify-content:flex-end; align-items:center;">
                <div id="sA" class="pts">0</div><div id="gA" class="games">0</div><div id="stA" class="sets">0</div>
            </div>
        </div>
        <div class="row" style="color: #2196F3; border: none;">
            <div style="flex:4;">
                <div style="display:flex; align-items:center;"><span id="nB1" class="name"></span><div id="bB1" class="serve-ball"></div></div>
                <div style="display:flex; align-items:center; margin-top:15px;"><span id="nB2" class="name"></span><div id="bB2" class="serve-ball"></div></div>
            </div>
            <div style="display:flex; flex:6; justify-content:flex-end; align-items:center;">
                <div id="sB" class="pts">0</div><div id="gB" class="games">0</div><div id="stB" class="sets">0</div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyCjlHL7GEXFvnrNzZAIEZyl-WCqUI3txiM", 
            authDomain: "scoretrak-123.firebaseapp.com", 
            databaseURL: "https://scoretrak-123-default-rtdb.europe-west1.firebasedatabase.app", 
            projectId: "scoretrak-123" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // MISE A JOUR DU LIEN QR CODE
        const urlSmartphone = "https://score-trak.vercel.app/SmartphoneV5.html";
        document.getElementById('qr-code-img').src = `https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=${encodeURIComponent(urlSmartphone)}&color=000000`;

        const labels = ["0", "15", "30", "40", "AD"];

        onValue(ref(db, 'match/terrain1'), (snap) => {
            const d = snap.val();
            const idle = document.getElementById('idle-screen');
            const setup = document.getElementById('setup-screen');
            const main = document.getElementById('main-ui');
            const victory = document.getElementById('victory-screen');

            if (!d || d.status === 'idle') {
                idle.style.display = 'flex'; setup.style.display = 'none'; main.style.visibility = 'hidden'; victory.style.display = 'none'; return;
            }
            if (d.status === 'setup') {
                idle.style.display = 'none'; setup.style.display = 'flex'; main.style.visibility = 'hidden'; victory.style.display = 'none'; return;
            }

            idle.style.display = 'none'; setup.style.display = 'none'; main.style.visibility = 'visible';
            
            if (d.winner) {
                victory.style.display = 'flex';
                document.getElementById('win-names-tv').innerText = d.winner === 'A' ? `${d.pA1} & ${d.pA2}` : `${d.pB1} & ${d.pB2}`;
            } else { victory.style.display = 'none'; }

            document.getElementById('nA1').innerText = d.pA1; document.getElementById('nA2').innerText = d.pA2;
            document.getElementById('nB1').innerText = d.pB1; document.getElementById('nB2').innerText = d.pB2;
            const isTB = (d.gamesA === 6 && d.gamesB === 6);
            document.getElementById('sA').innerText = isTB ? d.scoreA : (labels[d.scoreA] || "0");
            document.getElementById('sB').innerText = isTB ? d.scoreB : (labels[d.scoreB] || "0");
            document.getElementById('gA').innerText = d.gamesA; document.getElementById('gB').innerText = d.gamesB;
            document.getElementById('stA').innerText = d.setsA; document.getElementById('stB').innerText = d.setsB;

            ['bA1', 'bA2', 'bB1', 'bB2'].forEach(id => document.getElementById(id).style.display = 'none');
            const ball = 'b' + d.serverTeam + d.serverNum;
            if(document.getElementById(ball)) document.getElementById(ball).style.display = 'block';
        });
    </script>
</body>
</html>
