<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScoreTrak TV - Live V5 Design</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Roboto:wght@900&display=swap');

        body { 
            background: #000; 
            color: white; 
            font-family: 'Roboto', sans-serif; 
            margin: 0; 
            height: 100vh; 
            width: 100vw; 
            overflow: hidden; 
            display: flex;
            flex-direction: column;
        }

        /* Écran d'attente */
        #waiting-screen { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 100; 
        }
        .logo-wait { font-size: 12vw; font-weight: 900; color: #ccff00; font-style: italic; letter-spacing: -3px; }
        .sub-wait { font-size: 2vw; color: #444; text-transform: uppercase; letter-spacing: 10px; margin-top: -2vw; }

        /* Écran de Victoire */
        #victory-screen { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; display: none; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 200; text-align: center; 
        }
        .victoire-title { font-size: 10vw; color: #ccff00; text-shadow: 0 0 50px rgba(204, 255, 0, 0.5); animation: pulse 1s infinite; font-family: 'Orbitron'; }
        .victoire-names { font-size: 5vw; color: white; margin-top: 20px; }

        /* Interface Scoreboard (Design V5) */
        .scoreboard-wrapper { flex: 1; display: flex; flex-direction: column; width: 100%; visibility: hidden; }
        
        table { width: 100%; height: 100%; border-collapse: collapse; table-layout: fixed; }
        
        thead th { 
            background: #111; color: #555; font-size: 1.8vw; 
            padding: 1.5vh; text-transform: uppercase; border-bottom: 2px solid #222; 
        }

        .col-names { width: 45%; }
        .col-set { width: 10%; }
        .col-points { width: 25%; background-color: #050505; }

        td { text-align: center; border-bottom: 1px solid #111; }

        .team-box { display: flex; flex-direction: column; justify-content: center; padding-left: 4vw; text-align: left; }
        .player-row { display: flex; align-items: center; height: 5vw; }
        .name { font-size: 4.5vw; font-weight: 900; text-transform: uppercase; line-height: 1; }

        /* Indicateur de service */
        .serve-ball { 
            width: 2.2vw; height: 2.2vw; background: #ccff00; 
            border-radius: 50%; margin-left: 1.5vw; 
            box-shadow: 0 0 25px #ccff00; display: none; 
        }

        .score-set { font-family: 'Orbitron', sans-serif; font-size: 9vw; font-weight: 900; color: #fff; }
        .score-main { font-family: 'Orbitron', sans-serif; font-size: 16vw; font-weight: 900; }

        .row-green { border-left: 3vw solid #4CAF50; }
        .row-green .name, .row-green .score-main { color: #4CAF50; }

        .row-blue { border-left: 3vw solid #2196F3; }
        .row-blue .name, .row-blue .score-main { color: #2196F3; }

        /* Barre de statut dorée */
        .status-bar { height: 12vh; background: #000; display: flex; justify-content: center; align-items: center; border-top: 2px solid #222; }
        .gold-badge { 
            color: #FFD600; font-size: 3.5vw; font-weight: 900; 
            text-transform: uppercase; letter-spacing: 8px; 
            text-shadow: 0 0 20px rgba(255, 214, 0, 0.6); 
            animation: blink-gold 1s infinite; display: none; 
        }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        @keyframes blink-gold { 0% { opacity: 1; } 50% { opacity: 0.2; } 100% { opacity: 1; } }
        .confetti { position: absolute; width: 15px; height: 15px; animation: fall 4s linear infinite; z-index: 250; }
        @keyframes fall { 0% { transform: translateY(-10vh) rotate(0deg); } 100% { transform: translateY(110vh) rotate(720deg); } }
    </style>
</head>
<body>

    <div id="waiting-screen">
        <div class="logo-wait">ScoreTrak</div>
        <div class="sub-wait">En attente des joueurs</div>
    </div>

    <div id="victory-screen">
        <div class="victoire-title">VICTOIRE</div>
        <div id="win-names-tv" class="victoire-names"></div>
    </div>

    <div id="main-ui" class="scoreboard-wrapper">
        <table>
            <thead>
                <tr>
                    <th class="col-names">Équipes</th>
                    <th class="col-set">Sets</th>
                    <th class="col-points">Points</th>
                </tr>
            </thead>
            <tbody>
                <tr class="row-green">
                    <td class="col-names">
                        <div class="team-box">
                            <div class="player-row"><span id="nA1" class="name"></span><div id="bA1" class="serve-ball"></div></div>
                            <div class="player-row"><span id="nA2" class="name"></span><div id="bA2" class="serve-ball"></div></div>
                        </div>
                    </td>
                    <td><span id="stA" class="score-set">0</span></td>
                    <td class="col-points"><span id="sA" class="score-main">0</span></td>
                </tr>
                <tr class="row-blue">
                    <td class="col-names">
                        <div class="team-box">
                            <div class="player-row"><span id="nB1" class="name"></span><div id="bB1" class="serve-ball"></div></div>
                            <div class="player-row"><span id="nB2" class="name"></span><div id="bB2" class="serve-ball"></div></div>
                        </div>
                    </td>
                    <td><span id="stB" class="score-set">0</span></td>
                    <td class="col-points"><span id="sB" class="score-main">0</span></td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="status-bar">
        <div id="status-badge" class="gold-badge">BALLE DE MATCH</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyCjlHL7GEXFvnrNzZAIEZyl-WCqUI3txiM", 
            authDomain: "scoretrak-123.firebaseapp.com", 
            databaseURL: "https://scoretrak-123-default-rtdb.europe-west1.firebasedatabase.app", 
            projectId: "scoretrak-123" 
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const labels = ["0", "15", "30", "40", "AD"];

        onValue(ref(db, 'match/terrain1'), (snap) => {
            const d = snap.val();
            const wait = document.getElementById('waiting-screen');
            const main = document.getElementById('main-ui');
            const victory = document.getElementById('victory-screen');
            const badge = document.getElementById('status-badge');

            if (!d || !d.active) {
                wait.style.display = 'flex';
                main.style.visibility = 'hidden';
                victory.style.display = 'none';
                badge.style.display = 'none';
                stopConfetti();
                return;
            }

            wait.style.display = 'none';
            main.style.visibility = 'visible';

            // Gestion de la victoire
            if (d.winner) {
                victory.style.display = 'flex';
                document.getElementById('win-names-tv').innerText = d.winner === 'A' ? `${d.pA1} & ${d.pA2}` : `${d.pB1} & ${d.pB2}`;
                startConfetti();
            } else {
                victory.style.display = 'none';
                stopConfetti();
            }

            // Mise à jour noms
            document.getElementById('nA1').innerText = d.pA1; 
            document.getElementById('nA2').innerText = d.pA2;
            document.getElementById('nB1').innerText = d.pB1; 
            document.getElementById('nB2').innerText = d.pB2;
            
            // Mise à jour Scores (Gestion Tie-break incluse)
            const isTB = (d.gamesA === 6 && d.gamesB === 6);
            document.getElementById('sA').innerText = isTB ? d.scoreA : (labels[d.scoreA] || "0");
            document.getElementById('sB').innerText = isTB ? d.scoreB : (labels[d.scoreB] || "0");
            
            // Affichage des Sets (V5 utilise uniquement le compteur de sets gagnés pour plus de clarté TV)
            document.getElementById('stA').innerText = d.setsA; 
            document.getElementById('stB').innerText = d.setsB;

            // Gestion du badge d'alerte (Optionnel - basé sur le score)
            if (d.scoreA === 4 || d.scoreB === 4) {
                badge.innerText = "BALLE DE JEU";
                badge.style.display = "block";
            } else {
                badge.style.display = "none";
            }

            // Balles de service
            ['bA1', 'bA2', 'bB1', 'bB2'].forEach(id => document.getElementById(id).style.display = 'none');
            const current = 'b' + d.serverTeam + d.serverNum;
            if(document.getElementById(current)) document.getElementById(current).style.display = 'block';
        });

        function startConfetti() {
            if (document.querySelectorAll('.confetti').length > 0) return;
            for(let i=0; i<100; i++) {
                let c = document.createElement('div');
                c.className = 'confetti';
                c.style.left = Math.random()*100+'vw';
                c.style.backgroundColor = ['#ccff00','#fff','#4CAF50','#2196F3','#FFD700'][Math.floor(Math.random()*5)];
                c.style.animationDuration = (Math.random()*3 + 2)+'s';
                c.style.animationDelay = (Math.random()*2)+'s';
                document.getElementById('victory-screen').appendChild(c);
            }
        }

        function stopConfetti() {
            const confettis = document.querySelectorAll('.confetti');
            confettis.forEach(c => c.remove());
        }
    </script>
</body>
</html>
