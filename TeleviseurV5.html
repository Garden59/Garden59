<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>ScoreTrak TV - v4 Monochrome</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Roboto:wght@900&display=swap');

        body { 
            background: #000; 
            color: white; 
            font-family: 'Roboto', sans-serif; 
            margin: 0; 
            height: 100vh; 
            overflow: hidden; 
        }
        
        /* 1. ÉCRAN VEILLE (IDLE) */
        #idle-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; z-index: 500; }
        
        .ad-space { 
            flex: 1.8; 
            border-right: 2px solid #1a1a1a; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            background: radial-gradient(circle at center, #111 0%, #000 100%); 
        }
        
        /* Cadre partenaire en blanc au lieu de jaune */
        .partner-box { 
            font-size: 5vw; 
            color: #ccff00; 
            font-style: italic; 
            border: 3px solid #333; 
            padding: 50px; 
            border-radius: 40px; 
            text-align: center; 
            font-weight: 900;
        }

        .qr-space { flex: 1.2; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #050505; }
        .qr-frame { background: white; padding: 20px; border-radius: 20px; }
        .qr-frame img { width: 20vw; height: 20vw; display: block; }
        
        /* Texte QR en blanc */
        .qr-text { 
            margin-top: 30px; 
            font-size: 1.6vw; 
            color: #ccff00; 
            text-align: center; 
            text-transform: uppercase; 
            letter-spacing: 2px;
            line-height: 1.2; 
        }

        /* 2. ÉCRAN SETUP (LOGO JAUNE) */
        #setup-screen { 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; display: none; 
            flex-direction: column; justify-content: center; 
            align-items: center; z-index: 550; 
        }
        
        /* Le logo reste JAUNE comme demandé */
        .logo-setup { 
            font-size: 12vw; 
            color: #ccff00; 
            font-family: 'Orbitron', sans-serif;
            font-style: italic; 
            font-weight: 900;
            animation: pulse 1.5s infinite; 
        }
        
        /* 3. ÉCRAN VICTOIRE (MONOCHROME) */
        #victory-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 600; }
        .victory-title { font-size: 10vw; color: #fff; font-family: 'Orbitron'; font-weight: 900; }

        /* 4. INTERFACE MATCH (MONOCHROME) */
        .main-container { height: 100vh; display: flex; flex-direction: column; justify-content: center; visibility: hidden; }
        
        .row { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 2vh 6vw; 
            border-bottom: 1px solid #222; 
            height: 48vh; 
        }
        
        .name { font-size: 5.5vw; font-weight: 900; text-transform: uppercase; color: #fff; }
        
        /* Balle de service blanche pour le contraste */
        .serve-ball { 
            width: 2.2vw; height: 2.2vw; background: #ccff00; 
            border-radius: 50%; margin-left: 25px; 
            box-shadow: 0 0 20px rgba(255,255,255,0.5); display: none; 
        }
        
        .pts { font-family: 'Orbitron', sans-serif; font-size: 22vw; font-weight: 900; min-width: 25vw; text-align: center; color: #fff; }
        
        /* Jeux en gris clair au lieu de jaune */
        .games { 
            font-family: 'Orbitron', sans-serif; 
            font-size: 10vw; 
            color: #fff; 
            background: #1a1a1a; 
            padding: 5px 30px; 
            border-radius: 10px; 
            margin: 0 40px; 
            border: 1px solid #333;
        }
        
        /* Sets en gris foncé */
        .sets { font-family: 'Orbitron', sans-serif; font-size: 7vw; color: #555; font-weight: 700; }

        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.05); opacity: 0.8; } }
    </style>
</head>
<body>

    <div id="idle-screen">
        <div class="ad-space">
            <div class="partner-box">PARTENAIRE<br>DU CLUB</div>
        </div>
        <div class="qr-space">
            <div class="qr-frame"><img id="qr-code-img" src="" alt="QR"></div>
            <div class="qr-text">Scanner pour<br>gérer le score</div>
        </div>
    </div>

    <div id="setup-screen">
        <div class="logo-setup">ScoreTrak</div>
        <div style="font-size: 1.5vw; color: #555; text-transform: uppercase; letter-spacing: 12px; margin-top: 10px; font-weight: bold;">Configuration...</div>
    </div>

    <div id="victory-screen">
        <div class="victory-title">VICTOIRE</div>
        <div id="win-names-tv" style="font-size: 5vw; color: white; margin-top: 20px; text-transform: uppercase; font-weight: 900;"></div>
    </div>

    <div id="main-ui" class="main-container">
        <div class="row">
            <div style="flex:4;">
                <div style="display:flex; align-items:center;"><span id="nA1" class="name"></span><div id="bA1" class="serve-ball"></div></div>
                <div style="display:flex; align-items:center; margin-top:10px;"><span id="nA2" class="name"></span><div id="bA2" class="serve-ball"></div></div>
            </div>
            <div style="display:flex; flex:6; justify-content:flex-end; align-items:center;">
                <div id="sA" class="pts">0</div>
                <div id="gA" class="games">0</div>
                <div id="stA" class="sets">0</div>
            </div>
        </div>
        <div class="row" style="border: none;">
            <div style="flex:4;">
                <div style="display:flex; align-items:center;"><span id="nB1" class="name"></span><div id="bB1" class="serve-ball"></div></div>
                <div style="display:flex; align-items:center; margin-top:10px;"><span id="nB2" class="name"></span><div id="bB2" class="serve-ball"></div></div>
            </div>
            <div style="display:flex; flex:6; justify-content:flex-end; align-items:center;">
                <div id="sB" class="pts">0</div>
                <div id="gB" class="games">0</div>
                <div id="stB" class="sets">0</div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyCjlHL7GEXFvnrNzZAIEZyl-WCqUI3txiM", 
            authDomain: "scoretrak-123.firebaseapp.com", 
            databaseURL: "https://scoretrak-123-default-rtdb.europe-west1.firebasedatabase.app", 
            projectId: "scoretrak-123" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // MISE A JOUR DU LIEN QR CODE
        const urlSmartphone = "https://dashing-youtiao-01e5cd.netlify.app/smartphonev4";
        document.getElementById('qr-code-img').src = `https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=${encodeURIComponent(urlSmartphone)}&color=000000`;

        const labels = ["0", "15", "30", "40", "AD"];

        onValue(ref(db, 'match/terrain1'), (snap) => {
            const d = snap.val();
            const idle = document.getElementById('idle-screen');
            const setup = document.getElementById('setup-screen');
            const main = document.getElementById('main-ui');
            const victory = document.getElementById('victory-screen');

            // GESTION DES ÉCRANS
            if (!d || d.status === 'idle') {
                idle.style.display = 'flex'; setup.style.display = 'none'; main.style.visibility = 'hidden'; victory.style.display = 'none'; return;
            }
            if (d.status === 'setup') {
                idle.style.display = 'none'; setup.style.display = 'flex'; main.style.visibility = 'hidden'; victory.style.display = 'none'; return;
            }

            idle.style.display = 'none'; setup.style.display = 'none'; main.style.visibility = 'visible';
            
            // VICTOIRE
            if (d.winner) {
                victory.style.display = 'flex';
                document.getElementById('win-names-tv').innerText = d.winner === 'A' ? `${d.pA1} & ${d.pA2}` : `${d.pB1} & ${d.pB2}`;
            } else { victory.style.display = 'none'; }

            // DONNÉES MATCH
            document.getElementById('nA1').innerText = d.pA1 || ""; 
            document.getElementById('nA2').innerText = d.pA2 || "";
            document.getElementById('nB1').innerText = d.pB1 || ""; 
            document.getElementById('nB2').innerText = d.pB2 || "";

            const isTB = (d.gamesA === 6 && d.gamesB === 6);
            document.getElementById('sA').innerText = isTB ? d.scoreA : (labels[d.scoreA] || "0");
            document.getElementById('sB').innerText = isTB ? d.scoreB : (labels[d.scoreB] || "0");
            
            document.getElementById('gA').innerText = d.gamesA || 0; 
            document.getElementById('gB').innerText = d.gamesB || 0;
            
            document.getElementById('stA').innerText = d.setsA || 0; 
            document.getElementById('stB').innerText = d.setsB || 0;

            // SERVICE
            ['bA1', 'bA2', 'bB1', 'bB2'].forEach(id => document.getElementById(id).style.display = 'none');
            const ball = 'b' + d.serverTeam + d.serverNum;
            if(document.getElementById(ball)) document.getElementById(ball).style.display = 'block';
        });
    </script>
</body>
</html>
