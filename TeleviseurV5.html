<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>ScoreTrak TV - Live</title>
    <style>
        body { background: #000; color: white; font-family: 'Arial Black', sans-serif; margin: 0; height: 100vh; overflow: hidden; }
        
        /* Écran d'attente */
        #waiting-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        .logo-wait { font-size: 12vw; font-weight: 900; color: #ccff00; font-style: italic; letter-spacing: -3px; }
        .sub-wait { font-size: 2vw; color: #444; text-transform: uppercase; letter-spacing: 10px; margin-top: -2vw; }

        /* Écran de Victoire */
        #victory-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 200; text-align: center; }
        .victoire-title { font-size: 10vw; color: #ccff00; text-shadow: 0 0 50px rgba(204, 255, 0, 0.5); animation: pulse 1s infinite; }
        .victoire-names { font-size: 5vw; color: white; margin-top: 20px; }

        /* Interface Score */
        .main-container { height: 100vh; display: flex; flex-direction: column; justify-content: center; visibility: hidden; }
        .row { display: flex; align-items: center; justify-content: space-between; padding: 2vh 3vw; border-bottom: 2px solid #111; height: 45vh; }
        .names-col { flex: 4; display: flex; flex-direction: column; justify-content: center; max-width: 45%; }
        .player-row { display: flex; align-items: center; height: 8vw; }
        .name { font-size: 5.5vw; font-weight: bold; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 85%; }
        .serve-ball { width: 2.8vw; height: 2.8vw; background: #ccff00; border-radius: 50%; margin-left: 20px; box-shadow: 0 0 20px #ccff00; display: none; }
        
        .score-box { display: flex; flex: 6; justify-content: flex-end; align-items: center; }
        .pts { font-size: 23vw; font-weight: 900; min-width: 26vw; text-align: center; line-height: 0.8; }
        .games { font-size: 11vw; color: #FFD700; background: #1a1a1a; padding: 10px 25px; border-radius: 15px; margin: 0 30px; border: 2px solid #333; }
        .sets { font-size: 8vw; color: #FF5722; min-width: 5vw; text-align: center; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .confetti { position: absolute; width: 15px; height: 15px; animation: fall 4s linear infinite; }
        @keyframes fall { 0% { transform: translateY(-10vh) rotate(0deg); } 100% { transform: translateY(110vh) rotate(720deg); } }
    </style>
</head>
<body>

    <div id="waiting-screen">
        <div class="logo-wait">ScoreTrak</div>
        <div class="sub-wait">En attente des joueurs</div>
    </div>

    <div id="victory-screen">
        <div class="victoire-title">VICTOIRE</div>
        <div id="win-names-tv" class="victoire-names"></div>
    </div>

    <div id="main-ui" class="main-container">
        <div class="row" style="color: #4CAF50;">
            <div class="names-col">
                <div class="player-row"><span id="nA1" class="name"></span><div id="bA1" class="serve-ball"></div></div>
                <div class="player-row"><span id="nA2" class="name"></span><div id="bA2" class="serve-ball"></div></div>
            </div>
            <div class="score-box">
                <div id="sA" class="pts">0</div><div id="gA" class="games">0</div><div id="stA" class="sets">0</div>
            </div>
        </div>
        <div class="row" style="color: #2196F3; border: none;">
            <div class="names-col">
                <div class="player-row"><span id="nB1" class="name"></span><div id="bB1" class="serve-ball"></div></div>
                <div class="player-row"><span id="nB2" class="name"></span><div id="bB2" class="serve-ball"></div></div>
            </div>
            <div class="score-box">
                <div id="sB" class="pts">0</div><div id="gB" class="games">0</div><div id="stB" class="sets">0</div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyCjlHL7GEXFvnrNzZAIEZyl-WCqUI3txiM", authDomain: "scoretrak-123.firebaseapp.com", databaseURL: "https://scoretrak-123-default-rtdb.europe-west1.firebasedatabase.app", projectId: "scoretrak-123" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const labels = ["0", "15", "30", "40", "AD"];

        onValue(ref(db, 'match/terrain1'), (snap) => {
            const d = snap.val();
            const wait = document.getElementById('waiting-screen');
            const main = document.getElementById('main-ui');
            const victory = document.getElementById('victory-screen');

            if (!d || !d.active) {
                wait.style.display = 'flex';
                main.style.visibility = 'hidden';
                victory.style.display = 'none';
                stopConfetti();
                return;
            }

            wait.style.display = 'none';
            main.style.visibility = 'visible';

            // Gestion de la victoire
            if (d.winner) {
                victory.style.display = 'flex';
                document.getElementById('win-names-tv').innerText = d.winner === 'A' ? `${d.pA1} & ${d.pA2}` : `${d.pB1} & ${d.pB2}`;
                startConfetti();
            } else {
                victory.style.display = 'none';
                stopConfetti();
            }

            // Mise à jour noms et scores
            document.getElementById('nA1').innerText = d.pA1; document.getElementById('nA2').innerText = d.pA2;
            document.getElementById('nB1').innerText = d.pB1; document.getElementById('nB2').innerText = d.pB2;
            
            const isTB = (d.gamesA === 6 && d.gamesB === 6);
            document.getElementById('sA').innerText = isTB ? d.scoreA : (labels[d.scoreA] || "0");
            document.getElementById('sB').innerText = isTB ? d.scoreB : (labels[d.scoreB] || "0");
            document.getElementById('gA').innerText = d.gamesA; document.getElementById('gB').innerText = d.gamesB;
            document.getElementById('stA').innerText = d.setsA; document.getElementById('stB').innerText = d.setsB;

            // Balles de service
            ['bA1', 'bA2', 'bB1', 'bB2'].forEach(id => document.getElementById(id).style.display = 'none');
            const current = 'b' + d.serverTeam + d.serverNum;
            if(document.getElementById(current)) document.getElementById(current).style.display = 'block';
        });

        function startConfetti() {
            if (document.querySelectorAll('.confetti').length > 0) return;
            for(let i=0; i<100; i++) {
                let c = document.createElement('div');
                c.className = 'confetti';
                c.style.left = Math.random()*100+'vw';
                c.style.backgroundColor = ['#ccff00','#fff','#4CAF50','#2196F3','#FFD700'][Math.floor(Math.random()*5)];
                c.style.animationDuration = (Math.random()*3 + 2)+'s';
                c.style.animationDelay = (Math.random()*2)+'s';
                document.getElementById('victory-screen').appendChild(c);
            }
        }

        function stopConfetti() {
            const confettis = document.querySelectorAll('.confetti');
            confettis.forEach(c => c.remove());
        }
    </script>
</body>
</html>
