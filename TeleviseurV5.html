<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>ScoreTrak TV - Pro Live Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Roboto:wght@400;700;900&display=swap');

        :root {
            --neon-green: #30ff91;
            --neon-blue: #2e7dff;
            --bg-dark: #0a0a0a;
            --panel-dark: #111111;
            --text-gray: #888;
        }

        body { 
            background: #000; 
            color: white; 
            font-family: 'Roboto', sans-serif; 
            margin: 0; 
            height: 100vh; 
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 1. ÉCRAN VEILLE (LOGO JAUNE) */
        #idle-screen, #setup-screen { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; z-index: 1000; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; 
        }

        .logo-setup { 
            font-size: 10vw; color: #ccff00; font-family: 'Orbitron'; 
            font-style: italic; font-weight: 900; animation: pulse 1.5s infinite; 
        }

        /* 2. INTERFACE MATCH PRO */
        .scoreboard-container {
            width: 95vw;
            height: 85vh;
            background: var(--bg-dark);
            border: 2px solid #222;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0,0,0,1);
            visibility: hidden;
        }

        /* Header */
        .sb-header {
            display: grid;
            grid-template-columns: 45% 10% 10% 10% 25%;
            background: #181818;
            padding: 15px 0;
            border-bottom: 2px solid #000;
            color: var(--text-gray);
            font-weight: 900;
            font-size: 1.2vw;
            text-transform: uppercase;
            text-align: center;
        }

        /* Lignes Équipes */
        .sb-row {
            display: grid;
            grid-template-columns: 45% 10% 10% 10% 25%;
            height: 50%;
            border-bottom: 1px solid #222;
        }

        .team-info {
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding-left: 40px;
            position: relative;
        }

        /* Barre latérale de couleur */
        .side-bar {
            position: absolute;
            left: 0; top: 15%; height: 70%; width: 8px; border-radius: 0 4px 4px 0;
        }
        .green-bar { background: var(--neon-green); box-shadow: 0 0 15px var(--neon-green); }
        .blue-bar { background: var(--neon-blue); box-shadow: 0 0 15px var(--neon-blue); }

        .team-name { font-size: 4vw; font-weight: 900; text-transform: uppercase; margin-bottom: -5px; }
        .players { font-size: 1.2vw; color: var(--text-gray); font-weight: 400; }

        /* Colonnes Scores */
        .set-box {
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron';
            font-size: 6vw;
            font-weight: 700;
            border-right: 1px solid #1a1a1a;
        }

        .points-box {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #080808;
            font-family: 'Orbitron';
            font-size: 14vw;
            font-weight: 900;
        }

        /* Couleurs Néon Spécifiques */
        .team-green .team-name { color: var(--neon-green); }
        .team-green .points-box { color: var(--neon-green); text-shadow: 0 0 30px rgba(48, 255, 145, 0.4); }
        
        .team-blue .team-name { color: var(--neon-blue); }
        .team-blue .points-box { color: var(--neon-blue); text-shadow: 0 0 30px rgba(46, 125, 255, 0.4); }

        /* Balle de Service */
        .serve-ball {
            width: 1.5vw; height: 1.5vw; background: #ccff00;
            border-radius: 50%; position: absolute; left: 15px;
            box-shadow: 0 0 15px #ccff00; display: none;
        }

        /* Footer */
        .sb-footer {
            height: 60px;
            background: #000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
            color: #444;
            font-size: 0.9vw;
            text-transform: uppercase;
            font-weight: 700;
        }

        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.05); opacity: 0.8; } }
    </style>
</head>
<body>

    <div id="idle-screen">
        <div class="logo-setup">ScoreTrak</div>
        <div style="margin-top:20px; background:white; padding:15px; border-radius:15px;">
            <img id="qr-code-img" style="width:15vw;" src="" alt="QR">
        </div>
    </div>

    <div id="main-ui" class="scoreboard-container">
        <div class="sb-header">
            <div>Équipes</div>
            <div>S1</div>
            <div>S2</div>
            <div>S3</div>
            <div>Jeu</div>
        </div>

        <div class="sb-row team-green">
            <div class="team-info">
                <div id="bA" class="serve-ball"></div> <div class="side-bar green-bar"></div>
                <div id="teamNameA" class="team-name">Équipe Verte</div>
                <div id="playersA" class="players">P. NOM / P. NOM</div>
            </div>
            <div class="set-box" id="s1A">-</div>
            <div class="set-box" id="s2A">-</div>
            <div class="set-box" id="s3A">-</div>
            <div class="points-box" id="sA">0</div>
        </div>

        <div class="sb-row team-blue">
            <div class="team-info">
                <div id="bB" class="serve-ball"></div> <div class="side-bar blue-bar"></div>
                <div id="teamNameB" class="team-name">Équipe Bleue</div>
                <div id="playersB" class="players">P. NOM / P. NOM</div>
            </div>
            <div class="set-box" id="s1B">-</div>
            <div class="set-box" id="s2B">-</div>
            <div class="set-box" id="s3B">-</div>
            <div class="points-box" id="sB">0</div>
        </div>

        <div class="sb-footer">
            <div>Court n°1 - Live ScoreTrak</div>
            <div style="color: #664400">Point d'or (No-Ad)</div>
            <div id="version-label">Connecté : V1.2</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyCjlHL7GEXFvnrNzZAIEZyl-WCqUI3txiM", 
            authDomain: "scoretrak-123.firebaseapp.com", 
            databaseURL: "https://scoretrak-123-default-rtdb.europe-west1.firebasedatabase.app", 
            projectId: "scoretrak-123" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const urlSmartphone = "https://dashing-youtiao-01e5cd.netlify.app/smartphonev4";
        document.getElementById('qr-code-img').src = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(urlSmartphone)}`;

        const labels = ["0", "15", "30", "40", "AD"];

        onValue(ref(db, 'match/terrain1'), (snap) => {
            const d = snap.val();
            const idle = document.getElementById('idle-screen');
            const main = document.getElementById('main-ui');

            if (!d || d.status === 'idle') {
                idle.style.display = 'flex'; main.style.visibility = 'hidden'; return;
            }

            idle.style.display = 'none'; main.style.visibility = 'visible';
            
            // Noms et Joueurs
            document.getElementById('playersA').innerText = `${d.pA1} / ${d.pA2}`;
            document.getElementById('playersB').innerText = `${d.pB1} / ${d.pB2}`;

            // Points (Jeu actuel)
            const isTB = (d.gamesA === 6 && d.gamesB === 6);
            document.getElementById('sA').innerText = isTB ? d.scoreA : (labels[d.scoreA] || "0");
            document.getElementById('sB').innerText = isTB ? d.scoreB : (labels[d.scoreB] || "0");
            
            // Jeux (On utilise gamesA/B pour le set en cours, ici simulé sur S1/S2/S3 selon les sets gagnés)
            // Note : Pour un affichage parfait S1/S2/S3, il faudrait que ton Firebase envoie l'historique des sets.
            // Ici on affiche le set en cours dans la colonne correspondante.
            const currentSet = (d.setsA + d.setsB) + 1;
            document.getElementById(`s${currentSet}A`).innerText = d.gamesA;
            document.getElementById(`s${currentSet}B`).innerText = d.gamesB;

            // Service
            document.getElementById('bA').style.display = d.serverTeam === 'A' ? 'block' : 'none';
            document.getElementById('bB').style.display = d.serverTeam === 'B' ? 'block' : 'none';
        });
    </script>
</body>
</html>
