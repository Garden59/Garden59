<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>ScoreTrak TV</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .ads { flex: 1.8; border-right: 2px solid #222; display: flex; align-items: center; justify-content: center; }
        .qr-zone { flex: 1.2; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .qr-frame { background: white; padding: 20px; border-radius: 20px; }
        #match-ui { position: fixed; inset: 0; background: #000; display: none; grid-template-columns: 40% 10% 10% 10% 30%; z-index: 1000; }
        .cell { display: flex; align-items: center; justify-content: center; border: 1px solid #111; font-size: 6vw; font-weight: bold; }
        .pts { font-size: 13vw; color: #00d2ff; background: rgba(0,210,255,0.05); }
    </style>
</head>
<body>
    <div class="ads"><div style="font-size: 5vw; color: #ccff00;">PARTENAIRE CLUB</div></div>
    <div class="qr-zone">
        <div class="qr-frame"><img id="qr-code" src=""></div>
        <h2 style="color:#ccff00">SCANNEZ POUR JOUER</h2>
    </div>

    <div id="match-ui"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        
        const fbConfig = { apiKey: "AIzaSyCjlHL7GEXFvnrNzZAIEZyl-WCqUI3txiM", authDomain: "scoretrak-123.firebaseapp.com", databaseURL: "https://scoretrak-123-default-rtdb.europe-west1.firebasedatabase.app", projectId: "scoretrak-123" };
        const app = initializeApp(fbConfig); const db = getDatabase(app);

        // RÉCUPÉRATION
        const urlParams = new URLSearchParams(window.location.search);
        const clubId = urlParams.get('clubId');
        const courtId = urlParams.get('courtId');

        if(clubId && courtId) {
            // LIEN VERS SmartphoneV5.html avec EXACTEMENT les mêmes noms
            const adminURL = `https://score-trak.vercel.app/SmartphoneV5.html?clubId=${clubId}&courtId=${courtId}`;
            document.getElementById('qr-code').src = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(adminURL)}`;

            onValue(ref(db, `clubs/${clubId}/courts/${courtId}`), snap => {
                const d = snap.val(); if(!d) return;
                const ui = document.getElementById('match-ui');
                if(d.status === 'active') {
                    ui.style.display = 'grid';
                    ui.innerHTML = `
                        <div class="cell" style="height:50vh">${d.pA1}<br>${d.pA2}</div>
                        <div class="cell">${d.s1A||d.gamesA}</div><div class="cell">${d.s2A||''}</div><div class="cell">${d.s3A||''}</div>
                        <div class="cell pts">${d.scoreA||0}</div>
                        <div class="cell" style="height:50vh">${d.pB1}<br>${d.pB2}</div>
                        <div class="cell">${d.s1B||d.gamesB}</div><div class="cell">${d.s2B||''}</div><div class="cell">${d.s3B||''}</div>
                        <div class="cell pts">${d.scoreB||0}</div>
                    `;
                } else { ui.style.display = 'none'; }
            });
        }
    </script>
</body>
</html>
