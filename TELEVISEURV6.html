<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>ScoreTrak TV - Debug</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .ads { flex: 1.8; border-right: 2px solid #222; display: flex; align-items: center; justify-content: center; background: #111; }
        .qr-zone { flex: 1.2; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        .qr-frame { background: white; padding: 20px; border-radius: 20px; min-width: 200px; min-height: 200px; display: flex; align-items: center; justify-content: center; }
        #match-ui { position: fixed; inset: 0; background: #000; display: none; z-index: 1000; }
        .error-msg { color: #ff4444; font-size: 14px; margin-top: 20px; border: 1px solid #ff4444; padding: 10px; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="ads"><div style="font-size: 5vw; color: #ccff00;">PUB / LOGO CLUB</div></div>
    
    <div class="qr-zone">
        <div class="qr-frame">
            <img id="qr-code" src="" alt="En attente d'ID...">
        </div>
        <h2 id="status-text" style="color:#ccff00">CHARGEMENT...</h2>
        <div id="debug-area"></div>
    </div>

    <div id="match-ui"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        
        const fbConfig = { apiKey: "AIzaSyCjlHL7GEXFvnrNzZAIEZyl-WCqUI3txiM", authDomain: "scoretrak-123.firebaseapp.com", databaseURL: "https://scoretrak-123-default-rtdb.europe-west1.firebasedatabase.app", projectId: "scoretrak-123" };
        const app = initializeApp(fbConfig); const db = getDatabase(app);

        // 1. ON RÉCUPÈRE LES PARAMÈTRES
        const urlParams = new URLSearchParams(window.location.search);
        const clubId = urlParams.get('clubId');
        const courtId = urlParams.get('courtId');

        const qrImg = document.getElementById('qr-code');
        const statusTxt = document.getElementById('status-text');
        const debugArea = document.getElementById('debug-area');

        // 2. VÉRIFICATION CRITIQUE
        if (clubId && courtId) {
            statusTxt.innerText = "SCANNEZ POUR JOUER";
            
            // On génère le lien complet pour le QR Code
            const adminURL = `https://score-trak.vercel.app/SmartphoneV5.html?clubId=${clubId}&courtId=${courtId}`;
            qrImg.src = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(adminURL)}`;

            // Connexion Firebase
            onValue(ref(db, `clubs/${clubId}/courts/${courtId}`), snap => {
                const d = snap.val();
                if(d && d.status === 'active') {
                    document.getElementById('match-ui').style.display = 'block';
                    document.getElementById('match-ui').innerHTML = `<h1 style="font-size:10vw; text-align:center; margin-top:20vh;">${d.scoreA} - ${d.scoreB}</h1>`;
                } else {
                    document.getElementById('match-ui').style.display = 'none';
                }
            });
        } else {
            // MESSAGE SI TU OUVRES LA PAGE SANS PASSER PAR L'ADMIN
            statusTxt.innerText = "ERREUR DE CONFIGURATION";
            statusTxt.style.color = "red";
            debugArea.innerHTML = `
                <div class="error-msg">
                    <b>IDs manquants dans l'URL !</b><br>
                    Cette page TV ne sait pas quel terrain elle doit afficher.<br><br>
                    👉 <b>Solution :</b> Allez sur votre page Admin et cliquez sur le bouton <b>"LIEN TV"</b>.
                </div>
            `;
        }
    </script>
</body>
</html>
