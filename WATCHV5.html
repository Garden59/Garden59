<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ScoreTrak Watch V5</title>
    <style>
        html, body { margin: 0; padding: 0; background: #000; font-family: 'Arial Black', sans-serif; overflow: hidden; height: 100%; position: fixed; width: 100%; }
        #waiting-overlay, #win-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; display: none; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .container { display: flex; flex-direction: column; height: 100vh; }
        .game-zone { flex: 1; width: 100%; display: flex; align-items: center; padding: 0 10px; box-sizing: border-box; }
        .score-row { display: grid; grid-template-columns: 1.8fr 1.2fr 1fr 0.6fr; width: 100%; align-items: center; color: white; }
        .player-line { display: flex; align-items: center; height: 18px; } 
        .serve-ball { width: 9px; height: 9px; background: #ccff00; border-radius: 50%; margin-left: 6px; display: none; box-shadow: 0 0 8px #ccff00; }
        .c-pts { font-size: 48px; font-weight: 900; text-align: center; }
        .c-games { font-size: 22px; color: #FFD700; background: #1a1a1a; border-radius: 8px; text-align: center; padding: 4px; }
        .undo-section { height: 75vh; background: #111; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 8px; }
        .btn-opt { width: 85%; padding: 12px; border-radius: 10px; border: none; font-weight: bold; background: #333; color: white; text-transform: uppercase; font-size: 11px; }
    </style>
</head>
<body>

    <div id="waiting-overlay">
        <div style="font-size: 32px; color: #ccff00; font-style: italic;">ScoreTrak</div>
        <div style="color: white; font-size: 9px; margin-top: 10px;">PRÊT POUR LE MATCH</div>
    </div>

    <div id="win-overlay">
        <div style="font-size: 28px; color: #ccff00;">VICTOIRE !</div>
        <div id="winner-names" style="color: white; font-size: 15px; margin: 15px 0;"></div>
        <button class="btn-opt" onclick="forceReset()" style="background:#ccff00; color:black;">FINIR LE MATCH</button>
    </div>

    <div class="container" id="main-ui-watch">
        <div class="game-zone" onclick="addPoint('scoreA')" style="border-bottom:1px solid #111">
            <div class="score-row">
                <div style="color:#4CAF50; font-size:9px;">
                    <div class="player-line"><span id="nA1"></span><div id="bA1" class="serve-ball"></div></div>
                    <div class="player-line" style="margin-top:4px;"><span id="nA2"></span><div id="bA2" class="serve-ball"></div></div>
                </div>
                <div id="ptsA" class="c-pts" style="color:#4CAF50;">0</div>
                <div id="gA" class="c-games">0</div>
                <div id="stA" style="color:#FF5722; font-size:16px; font-weight:bold; text-align:center;">0</div>
            </div>
        </div>

        <div class="game-zone" onclick="addPoint('scoreB')">
            <div class="score-row">
                <div style="color:#2196F3; font-size:9px;">
                    <div class="player-line"><span id="nB1"></span><div id="bB1" class="serve-ball"></div></div>
                    <div class="player-line" style="margin-top:4px;"><span id="nB2"></span><div id="bB2" class="serve-ball"></div></div>
                </div>
                <div id="ptsB" class="c-pts" style="color:#2196F3;">0</div>
                <div id="gB" class="c-games">0</div>
                <div id="stB" style="color:#FF5722; font-size:16px; font-weight:bold; text-align:center;">0</div>
            </div>
        </div>

        <div class="undo-section">
            <button class="btn-opt" onclick="undo()">↩ ANNULER POINT</button>
            <button class="btn-opt" style="background:#800;" onclick="forceReset()">QUITTER MATCH</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, get, set, onValue, push, query, limitToLast, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyCjlHL7GEXFvnrNzZAIEZyl-WCqUI3txiM", authDomain: "scoretrak-123.firebaseapp.com", databaseURL: "https://scoretrak-123-default-rtdb.europe-west1.firebasedatabase.app", projectId: "scoretrak-123" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const matchRef = ref(db, 'match/terrain1');
        const historyRef = ref(db, 'history/terrain1');

        document.addEventListener("visibilitychange", () => {
            if (document.visibilityState === 'visible') { location.reload(); }
        });

        onValue(matchRef, (snap) => {
            const d = snap.val();
            const wait = document.getElementById('waiting-overlay');
            const win = document.getElementById('win-overlay');
            if (!d || d.status !== 'active') { wait.style.display = 'flex'; win.style.display = 'none'; return; }
            wait.style.display = 'none';
            if (d.winner) {
                win.style.display = 'flex';
                document.getElementById('winner-names').innerText = d.winner === 'A' ? d.pA1 + " & " + d.pA2 : d.pB1 + " & " + d.pB2;
            } else { win.style.display = 'none'; }
            const labels = ["0", "15", "30", "40", "AD"];
            document.getElementById('nA1').innerText = d.pA1; document.getElementById('nA2').innerText = d.pA2;
            document.getElementById('nB1').innerText = d.pB1; document.getElementById('nB2').innerText = d.pB2;
            document.getElementById('ptsA').innerText = labels[d.scoreA] || d.scoreA;
            document.getElementById('ptsB').innerText = labels[d.scoreB] || d.scoreB;
            document.getElementById('gA').innerText = d.gamesA; document.getElementById('gB').innerText = d.gamesB;
            document.getElementById('stA').innerText = d.setsA; document.getElementById('stB').innerText = d.setsB;
            ['bA1', 'bA2', 'bB1', 'bB2'].forEach(id => document.getElementById(id).style.display = 'none');
            const ballId = 'b' + d.serverTeam + d.serverNum;
            if(document.getElementById(ballId)) document.getElementById(ballId).style.display = 'block';
        });

        window.addPoint = (team) => {
            get(matchRef).then((snap) => {
                let d = snap.val();
                if(!d || d.status !== 'active' || d.winner) return;
                push(historyRef, JSON.stringify(d));

                const opp = (team === 'scoreA') ? 'scoreB' : 'scoreA';
                const isNoAd = (d.rule === 'decisif');

                if (d[team] < 3) {
                    d[team]++;
                } else if (d[team] === 3) {
                    if (d[opp] < 3) { winGame(d, team); }
                    else if (d[opp] === 3) { if (isNoAd) winGame(d, team); else d[team] = 4; }
                    else if (d[opp] === 4) { d[opp] = 3; }
                } else if (d[team] === 4) {
                    winGame(d, team);
                }

                set(matchRef, d);
                if (navigator.vibrate) navigator.vibrate(40); 
            });
        };

        function winGame(d, team) {
            d.scoreA = 0; d.scoreB = 0;
            if (team === 'scoreA') d.gamesA++; else d.gamesB++;
            
            // Changement serveur
            d.serverTeam = (d.serverTeam === 'A') ? 'B' : 'A';
            
            // Logique Sets
            if (d.gamesA >= 6 && (d.gamesA - d.gamesB >= 2)) { d.setsA++; d.gamesA = 0; d.gamesB = 0; }
            else if (d.gamesB >= 6 && (d.gamesB - d.gamesA >= 2)) { d.setsB++; d.gamesA = 0; d.gamesB = 0; }
            
            if (d.setsA >= d.maxSets) d.winner = 'A';
            if (d.setsB >= d.maxSets) d.winner = 'B';
        }

        window.undo = () => {
            get(query(historyRef, limitToLast(1))).then((hSnap) => {
                if (hSnap.exists()) {
                    const key = Object.keys(hSnap.val())[0];
                    set(matchRef, JSON.parse(hSnap.val()[key]));
                    remove(ref(db, `history/terrain1/${key}`));
                }
            });
        };

        window.forceReset = () => {
            set(matchRef, { status: 'idle', active: false }).then(() => {
                remove(historyRef);
                location.reload();
            });
        };
    </script>
</body>
</html>
